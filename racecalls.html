<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Calls — Ryan McComb</title>
  <meta name="description" content="Ryan McComb's election race call record — tracking predictions and accuracy.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta property="og:title" content="Race Calls — Ryan McComb">
  <meta property="og:description" content="Election race call record — tracking predictions and accuracy.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/portrait.jpg">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>

  <nav class="site-nav" id="site-nav"></nav>

  <main>
    <div class="racecalls-page">

      <header class="racecalls-header">
        <span class="about-label">Decision Desk</span>
        <h1 class="racecalls-title">Race Call<br>Record</h1>
        <p class="racecalls-subtitle">Tracking my election race calls from VoteHub's decision desk.</p>
      </header>

      <!-- Hero stats -->
      <div class="rc-hero-stats" id="rc-stats">
        <div class="rc-ring-wrap">
          <svg class="rc-ring" viewBox="0 0 80 80">
            <circle class="rc-ring-bg" cx="40" cy="40" r="34" />
            <circle class="rc-ring-fill" id="rc-ring-fill" cx="40" cy="40" r="34" />
          </svg>
          <span class="rc-ring-label" id="rc-ring-label">&mdash;</span>
        </div>
        <div class="rc-stat-text">
          <span class="rc-stat-value" id="rc-accuracy">&mdash;</span>
          <span class="rc-stat-label">Accuracy</span>
        </div>
        <div class="rc-stat-strip">
          <div class="rc-stat-item">
            <span class="rc-stat-item-value rc-stat-correct" id="rc-correct">0</span>
            <span class="rc-stat-item-label">Correct</span>
          </div>
          <span class="rc-stat-divider"></span>
          <div class="rc-stat-item">
            <span class="rc-stat-item-value rc-stat-pending" id="rc-pending">0</span>
            <span class="rc-stat-item-label">Pending</span>
          </div>
          <span class="rc-stat-divider"></span>
          <div class="rc-stat-item">
            <span class="rc-stat-item-value" id="rc-total">0</span>
            <span class="rc-stat-item-label">Total</span>
          </div>
          <span class="rc-stat-divider"></span>
          <div class="rc-stat-item">
            <span class="rc-stat-item-value rc-stat-first" id="rc-first-pct">&mdash;</span>
            <span class="rc-stat-item-label">Called First*</span>
          </div>
        </div>
      </div>

      <!-- Merged filter row -->
      <div class="rc-filter-row">
        <div class="rc-filters" id="rc-filters">
          <button class="rc-filter-btn active" data-filter="all">All</button>
          <button class="rc-filter-btn" data-filter="correct">Correct</button>
          <button class="rc-filter-btn" data-filter="pending">Pending</button>
        </div>
        <span class="rc-filter-divider"></span>
        <div class="rc-filters rc-type-filters" id="rc-type-filters">
          <button class="rc-filter-btn active" data-type-filter="all">All Types</button>
          <button class="rc-filter-btn" data-type-filter="federal">Federal</button>
          <button class="rc-filter-btn" data-type-filter="state">State</button>
        </div>
      </div>

      <!-- Type breakdown (compact inline) -->
      <div class="rc-type-summary" id="rc-type-breakdown"></div>

      <!-- Race call list (grouped by date) -->
      <div class="rc-list" id="rc-list"></div>

      <div class="rc-empty" id="rc-empty" style="display:none">
        <p>No race calls match this filter.</p>
      </div>

      <div class="rc-footnote" id="rc-footnote">
        <p>*Major decision desks: AP, NYT, VoteHub, DDHQ</p>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    &copy; 2026 Ryan McComb &middot; Evanston, IL &middot; <a href="mailto:rymccomb1@icloud.com">rymccomb1@icloud.com</a>
  </footer>

  <script>
    (function() {
      var allCalls = [];
      var currentFilter = 'all';
      var currentTypeFilter = 'all';

      var raceTypeLabels = {
        presidential: 'Presidential', senate: 'Senate', house: 'House',
        governor: 'Governor', state_senate: 'State Senate', state_house: 'State House', other: 'Other'
      };

      var federalTypes = ['presidential', 'senate', 'house'];
      var stateTypes = ['governor', 'state_senate', 'state_house', 'other'];

      function esc(s) {
        var d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      }

      function renderStats(calls) {
        var correct = calls.filter(function(c) { return c.result === 'correct'; }).length;
        var incorrect = calls.filter(function(c) { return c.result === 'incorrect'; }).length;
        var pending = calls.filter(function(c) { return c.result === 'pending'; }).length;
        var decided = correct + incorrect;
        var pct = decided > 0 ? Math.round((correct / decided) * 100) : 0;

        // Called first: % of decided races where VoteHub was first caller
        var withFirstCaller = calls.filter(function(c) { return c.firstCaller; });
        var vhFirst = withFirstCaller.filter(function(c) { return c.firstCaller === 'votehub'; }).length;
        var firstPct = withFirstCaller.length > 0 ? Math.round((vhFirst / withFirstCaller.length) * 100) : 0;

        document.getElementById('rc-correct').textContent = correct;
        document.getElementById('rc-pending').textContent = pending;
        document.getElementById('rc-total').textContent = calls.length;
        document.getElementById('rc-accuracy').textContent = decided > 0 ? pct + '%' : '\u2014';
        document.getElementById('rc-ring-label').textContent = decided > 0 ? pct + '%' : '\u2014';
        document.getElementById('rc-first-pct').textContent = withFirstCaller.length > 0 ? firstPct + '%' : '\u2014';

        // Animate ring
        var ring = document.getElementById('rc-ring-fill');
        var circumference = 2 * Math.PI * 34;
        ring.style.strokeDasharray = circumference;
        var offset = circumference - (circumference * (decided > 0 ? pct / 100 : 0));
        setTimeout(function() {
          ring.style.strokeDashoffset = offset;
        }, 100);
      }

      function renderTypeBreakdown(calls) {
        var types = {};
        calls.forEach(function(c) {
          var rt = c.raceType || 'other';
          if (!types[rt]) types[rt] = { correct: 0, total: 0 };
          types[rt].total++;
          if (c.result === 'correct') types[rt].correct++;
        });

        var container = document.getElementById('rc-type-breakdown');
        var parts = [];
        Object.keys(types).forEach(function(rt) {
          var t = types[rt];
          var label = raceTypeLabels[rt] || rt;
          parts.push(esc(label) + ' ' + t.correct + '/' + t.total);
        });
        container.innerHTML = parts.join(' &middot; ');
      }

      function getFilteredCalls(calls) {
        var filtered = calls;
        if (currentFilter !== 'all') {
          filtered = filtered.filter(function(c) { return c.result === currentFilter; });
        }
        if (currentTypeFilter !== 'all') {
          if (currentTypeFilter === 'federal') {
            filtered = filtered.filter(function(c) { return federalTypes.indexOf(c.raceType || 'other') !== -1; });
          } else if (currentTypeFilter === 'state') {
            filtered = filtered.filter(function(c) { return stateTypes.indexOf(c.raceType || 'other') !== -1; });
          } else {
            filtered = filtered.filter(function(c) { return (c.raceType || 'other') === currentTypeFilter; });
          }
        }
        return filtered;
      }

      function renderList(calls) {
        var filtered = getFilteredCalls(calls);
        var list = document.getElementById('rc-list');
        var empty = document.getElementById('rc-empty');
        var footnote = document.getElementById('rc-footnote');

        if (!filtered.length) {
          list.innerHTML = '';
          empty.style.display = 'block';
          footnote.style.display = 'none';
          return;
        }

        empty.style.display = 'none';

        // Sort by date descending
        filtered.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

        // Group by date (YYYY-MM-DD)
        var groups = {};
        var groupOrder = [];
        filtered.forEach(function(c) {
          var dateKey = c.date ? c.date.split('T')[0] : 'unknown';
          if (!groups[dateKey]) {
            groups[dateKey] = [];
            groupOrder.push(dateKey);
          }
          groups[dateKey].push(c);
        });

        var hasFirstCall = false;
        var cardIndex = 0;
        var html = '';

        groupOrder.forEach(function(dateKey) {
          var groupCalls = groups[dateKey];
          var d = new Date(dateKey + 'T12:00:00');
          var dateStr = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

          html += '<div class="rc-date-group">';
          html += '<div class="rc-date-header">';
          html += '<span class="rc-date-label">' + dateStr + '</span>';
          html += '<span class="rc-date-count">' + groupCalls.length + ' call' + (groupCalls.length !== 1 ? 's' : '') + '</span>';
          html += '</div>';

          groupCalls.forEach(function(c) {
            var resultClass = c.result === 'correct' ? 'rc-result-correct' : c.result === 'incorrect' ? 'rc-result-incorrect' : 'rc-result-pending';

            // First call badge
            var firstCallBadge = '';
            if (c.firstCaller === 'votehub') {
              firstCallBadge = ' <span class="rc-first-call-badge">First Call</span>';
              hasFirstCall = true;
            }

            // Race type pills (inline with race name)
            var pills = '';
            if (c.raceType && raceTypeLabels[c.raceType]) {
              pills += ' <span class="rc-pill">' + esc(raceTypeLabels[c.raceType]) + '</span>';
            }
            if (c.isPrimary) {
              pills += ' <span class="rc-pill">Primary</span>';
            }
            if (c.state) {
              pills += ' <span class="rc-pill">' + esc(c.state) + '</span>';
            }

            // Margin display
            var marginHtml = '';
            if (c.margin != null) {
              marginHtml = '<span class="rc-margin">+' + c.margin + ' pts</span>';
            }

            // Build detail rows
            var details = [];
            if (c.calledFor) details.push('<span class="rc-detail-label">Called for</span> <strong>' + esc(c.calledFor) + '</strong>');
            if (c.margin != null) details.push('<span class="rc-detail-label">Margin</span> +' + c.margin + ' pts');
            if (c.notes) details.push('<span class="rc-detail-label">Notes</span> ' + esc(c.notes));

            html += '<div class="rc-call-card" style="animation-delay:' + (cardIndex * 0.05) + 's" onclick="this.classList.toggle(\'expanded\')">';
            html += '<div class="rc-call-top">';
            html += '<div class="rc-call-info">';
            html += '<div>';
            html += '<h3 class="rc-call-race">' + esc(c.race) + (pills ? ' ' + pills : '') + firstCallBadge + '</h3>';
            html += '<p class="rc-call-meta">Called for <strong>' + esc(c.calledFor) + '</strong>' + (marginHtml ? ' ' + marginHtml : '') + '</p>';
            html += '</div>';
            html += '</div>';
            html += '<span class="rc-call-result ' + resultClass + '">' + c.result + '</span>';
            html += '</div>';
            if (details.length) {
              html += '<div class="rc-call-details">';
              html += details.map(function(d) { return '<div class="rc-detail-row">' + d + '</div>'; }).join('');
              html += '</div>';
            }
            html += '</div>';

            cardIndex++;
          });

          html += '</div>';
        });

        list.innerHTML = html;
      }

      // Result filter buttons
      document.getElementById('rc-filters').addEventListener('click', function(e) {
        var btn = e.target.closest('.rc-filter-btn');
        if (!btn || !btn.dataset.filter) return;
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('#rc-filters .rc-filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderList(allCalls);
      });

      // Type filter buttons
      document.getElementById('rc-type-filters').addEventListener('click', function(e) {
        var btn = e.target.closest('.rc-filter-btn');
        if (!btn || !btn.dataset.typeFilter) return;
        currentTypeFilter = btn.dataset.typeFilter;
        document.querySelectorAll('#rc-type-filters .rc-filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderList(allCalls);
      });

      // Fetch data
      fetch('/api/racecalls')
        .then(function(r) { return r.json(); })
        .then(function(calls) {
          allCalls = calls;
          renderStats(calls);
          renderTypeBreakdown(calls);
          renderList(calls);
        });
    })();
  </script>
  <script src="js/nav.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/cmdk.js"></script>
</body>
</html>
