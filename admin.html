<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Admin — Race Calls</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: #e06b1f; color: #fff; }

        :root {
            --bg: #151515;
            --surface: #191919;
            --surface-2: #1e1e1e;
            --text: #e8e8e8;
            --text-light: #999;
            --text-muted: #555;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.16);
            --accent: #fff;
            --radius: 8px;
            --gold: #eab308;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        /* LOGIN */
        .login-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.3s;
        }
        .login-overlay.hidden { opacity: 0; pointer-events: none; }
        .login-box { text-align: center; max-width: 340px; padding: 2rem; }
        .login-box h1 {
            font-size: 1.8rem; font-weight: 600; margin-bottom: 0.3rem;
            color: #fff; letter-spacing: -0.03em;
        }
        .login-box p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .login-input {
            width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 0.85rem; background: var(--surface);
            color: var(--text); outline: none; margin-bottom: 0.75rem;
            font-family: inherit; transition: border-color 0.2s;
        }
        .login-input:focus { border-color: rgba(255,255,255,0.3); }
        .login-btn {
            width: 100%; padding: 0.7rem; background: #fff; color: #151515;
            border: none; border-radius: var(--radius); font-size: 0.8rem; font-weight: 600;
            cursor: pointer; font-family: inherit; letter-spacing: 0.02em;
            transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.85; }
        .login-error { color: #ef4444; font-size: 0.75rem; margin-top: 0.5rem; }

        /* LAYOUT */
        .dashboard { display: none; }
        .dashboard.active { display: block; }

        .dash-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.25rem 2rem; border-bottom: 1px solid var(--border);
            max-width: 960px; margin: 0 auto;
        }
        .dash-header h1 {
            font-size: 1.1rem; font-weight: 600; color: #fff;
            letter-spacing: -0.02em;
        }
        .dash-header-actions { display: flex; gap: 0.75rem; align-items: center; }
        .dash-header a {
            font-size: 0.75rem; color: var(--text-muted); text-decoration: none;
            transition: color 0.2s;
        }
        .dash-header a:hover { color: #fff; }
        .dash-logout {
            font-size: 0.7rem; color: var(--text-muted); background: none;
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 0.35rem 0.75rem; cursor: pointer; font-family: inherit;
            transition: all 0.2s;
        }
        .dash-logout:hover { border-color: var(--border-hover); color: var(--text); }

        .dash-content { max-width: 960px; margin: 0 auto; padding: 2rem; }

        /* QUICK ADD FORM */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .form-card-title {
            font-size: 0.7rem; font-weight: 500; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1.25rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.75rem;
        }
        .form-grid .span-2 { grid-column: span 2; }
        .form-grid .span-3 { grid-column: span 3; }

        .form-group { display: flex; flex-direction: column; }
        .form-label {
            font-size: 0.65rem; font-weight: 500; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.3rem;
        }
        .form-input, .form-select {
            width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border);
            border-radius: 6px; font-size: 0.82rem; background: var(--surface-2);
            color: var(--text); font-family: inherit; outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus { border-color: rgba(255,255,255,0.25); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-select option { background: var(--surface-2); }
        .form-select optgroup { color: var(--text-light); }

        .form-check {
            display: flex; align-items: center; gap: 0.4rem;
            cursor: pointer; font-size: 0.8rem; color: var(--text-light);
            margin-top: 0.2rem;
        }
        .form-check input { accent-color: #fff; }

        /* Separator */
        .form-sep {
            grid-column: span 3;
            border: none; border-top: 1px solid var(--border);
            margin: 0.25rem 0;
        }

        .form-actions {
            display: flex; gap: 0.5rem; margin-top: 1rem;
        }
        .btn {
            padding: 0.55rem 1.25rem; border: none; border-radius: 6px;
            font-size: 0.8rem; font-weight: 500; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
        }
        .btn-primary { background: #fff; color: #151515; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-ghost {
            background: none; color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

        /* RACE CALL LIST */
        .list-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.75rem;
        }
        .list-title {
            font-size: 0.7rem; font-weight: 500; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted);
        }
        .list-count {
            font-size: 0.7rem; color: var(--text-muted);
            background: var(--surface); padding: 0.15rem 0.6rem;
            border-radius: 10px; border: 1px solid var(--border);
        }

        .rc-card {
            display: flex; align-items: flex-start; gap: 0.75rem;
            padding: 0.9rem 1rem; border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 0.5rem;
            background: var(--surface); transition: border-color 0.2s;
        }
        .rc-card:hover { border-color: var(--border-hover); }

        .rc-card-badge {
            font-size: 1.1rem; flex-shrink: 0; line-height: 1;
            margin-top: 0.15rem;
        }
        .rc-card-body { flex: 1; min-width: 0; }
        .rc-card-title {
            font-size: 0.88rem; font-weight: 500; color: #fff;
            display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
        }
        .rc-card-title .pill {
            font-size: 0.62rem; font-weight: 500; padding: 0.1rem 0.45rem;
            border-radius: 4px; background: rgba(255,255,255,0.06);
            color: var(--text-light); text-transform: uppercase; letter-spacing: 0.04em;
        }
        .rc-card-title .first-star {
            color: var(--gold); font-size: 0.85rem;
        }
        .rc-card-meta {
            font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .rc-card-actions { display: flex; gap: 0.35rem; flex-shrink: 0; }
        .rc-card-btn {
            padding: 0.3rem 0.6rem; font-size: 0.65rem;
            border: 1px solid var(--border); border-radius: 5px;
            background: none; color: var(--text-muted); cursor: pointer;
            font-family: inherit; transition: all 0.2s;
        }
        .rc-card-btn:hover { border-color: var(--border-hover); color: var(--text); }
        .rc-card-btn.delete:hover { border-color: #ef4444; color: #ef4444; }

        .empty-state {
            text-align: center; padding: 2rem; color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.7rem 1.25rem;
            background: #22c55e; color: #fff; border-radius: var(--radius);
            font-size: 0.8rem; font-weight: 500; opacity: 0;
            transform: translateY(8px); transition: all 0.3s;
            z-index: 2000; pointer-events: none; font-family: inherit;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #ef4444; }

        @media (max-width: 700px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .form-grid .span-2 { grid-column: span 2; }
            .form-grid .span-3 { grid-column: span 2; }
            .dash-header { padding: 1rem; }
            .dash-content { padding: 1rem; }
            .rc-card { flex-direction: column; }
            .rc-card-actions { align-self: flex-end; }
        }
        @media (max-width: 420px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-grid .span-2, .form-grid .span-3 { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h1>Decision Desk</h1>
            <p>Enter password to manage race calls.</p>
            <input type="password" class="login-input" id="login-pw" placeholder="Password" autofocus>
            <button class="login-btn" onclick="attemptLogin()">Unlock</button>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="dash-header">
            <h1>Race Calls</h1>
            <div class="dash-header-actions">
                <a href="racecalls">View page</a>
                <a href="index.html">Site</a>
                <button class="dash-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="dash-content">

            <!-- QUICK ADD FORM -->
            <div class="form-card">
                <div class="form-card-title" id="rc-form-title">New Race Call</div>

                <div class="form-grid">
                    <!-- Row 1: Race name + type + primary -->
                    <div class="form-group span-2">
                        <label class="form-label">Race</label>
                        <input class="form-input" id="rc-race" maxlength="200" placeholder="e.g. IL-09 Dem Primary">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Type</label>
                        <select class="form-select" id="rc-racetype">
                            <optgroup label="Federal">
                                <option value="presidential">Presidential</option>
                                <option value="senate">Senate</option>
                                <option value="house" selected>House</option>
                            </optgroup>
                            <optgroup label="State">
                                <option value="governor">Governor</option>
                                <option value="state_senate">State Senate</option>
                                <option value="state_house">State House</option>
                                <option value="other">Other</option>
                            </optgroup>
                        </select>
                    </div>

                    <!-- Row 2: State + Date + Called For -->
                    <div class="form-group" id="rc-state-group">
                        <label class="form-label">State</label>
                        <select class="form-select" id="rc-state">
                            <option value="">--</option>
                            <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option>
                            <option value="AR">AR</option><option value="CA">CA</option><option value="CO">CO</option>
                            <option value="CT">CT</option><option value="DE">DE</option><option value="DC">DC</option>
                            <option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option>
                            <option value="ID">ID</option><option value="IL">IL</option><option value="IN">IN</option>
                            <option value="IA">IA</option><option value="KS">KS</option><option value="KY">KY</option>
                            <option value="LA">LA</option><option value="ME">ME</option><option value="MD">MD</option>
                            <option value="MA">MA</option><option value="MI">MI</option><option value="MN">MN</option>
                            <option value="MS">MS</option><option value="MO">MO</option><option value="MT">MT</option>
                            <option value="NE">NE</option><option value="NV">NV</option><option value="NH">NH</option>
                            <option value="NJ">NJ</option><option value="NM">NM</option><option value="NY">NY</option>
                            <option value="NC">NC</option><option value="ND">ND</option><option value="OH">OH</option>
                            <option value="OK">OK</option><option value="OR">OR</option><option value="PA">PA</option>
                            <option value="RI">RI</option><option value="SC">SC</option><option value="SD">SD</option>
                            <option value="TN">TN</option><option value="TX">TX</option><option value="UT">UT</option>
                            <option value="VT">VT</option><option value="VA">VA</option><option value="WA">WA</option>
                            <option value="WV">WV</option><option value="WI">WI</option><option value="WY">WY</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input class="form-input" id="rc-date" type="date">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Called For</label>
                        <input class="form-input" id="rc-calledfor" maxlength="100" placeholder="e.g. Daniel Biss">
                    </div>

                    <!-- Row 3: Result + Margin + Primary -->
                    <div class="form-group">
                        <label class="form-label">Result</label>
                        <select class="form-select" id="rc-result">
                            <option value="correct">Correct</option>
                            <option value="incorrect">Incorrect</option>
                            <option value="pending" selected>Pending</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Margin</label>
                        <input class="form-input" id="rc-margin" type="number" step="0.1" placeholder="e.g. 5.2">
                    </div>
                    <div class="form-group" style="justify-content:flex-end">
                        <label class="form-check">
                            <input type="checkbox" id="rc-isprimary">
                            Primary
                        </label>
                    </div>

                    <!-- Row 4: VoteHub first call -->
                    <div class="form-group span-3" style="justify-content:flex-start">
                        <label class="form-check">
                            <input type="checkbox" id="rc-vhfirst" checked>
                            VoteHub called first
                        </label>
                    </div>

                    <!-- Row 5: Notes -->
                    <div class="form-group span-3">
                        <label class="form-label">Notes</label>
                        <input class="form-input" id="rc-notes" maxlength="500" placeholder="Optional notes">
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" id="rc-submit-btn" onclick="submitRaceCall()">Add Call</button>
                    <button class="btn btn-ghost" id="rc-cancel-edit-btn" onclick="cancelEdit()" style="display:none">Cancel</button>
                </div>
            </div>

            <!-- LIST -->
            <div class="list-header">
                <span class="list-title">All Race Calls</span>
                <span class="list-count" id="rc-count">0</span>
            </div>
            <div id="rc-list"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let token = sessionStorage.getItem('admin_token') || '';
        let editingId = null;

        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
        }

        document.getElementById('login-pw').addEventListener('keydown', e => {
            if (e.key === 'Enter') attemptLogin();
        });

        function attemptLogin() {
            const pw = document.getElementById('login-pw').value;
            fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pw })
            })
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(() => {
                token = pw;
                sessionStorage.setItem('admin_token', pw);
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('dashboard').classList.add('active');
                loadRaceCalls();
            })
            .catch(() => {
                document.getElementById('login-error').textContent = 'Wrong password.';
            });
        }

        function logout() {
            token = '';
            sessionStorage.removeItem('admin_token');
            location.reload();
        }

        if (token) {
            fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: token })
            }).then(r => {
                if (r.ok) {
                    document.getElementById('login-overlay').classList.add('hidden');
                    document.getElementById('dashboard').classList.add('active');
                    loadRaceCalls();
                } else {
                    sessionStorage.removeItem('admin_token');
                    token = '';
                }
            });
        }

        // Smart defaults on load
        document.getElementById('rc-date').value = new Date().toISOString().split('T')[0];

        // Toggle state visibility
        document.getElementById('rc-racetype').addEventListener('change', function() {
            document.getElementById('rc-state-group').style.display = this.value === 'presidential' ? 'none' : '';
        });

        // Cmd/Ctrl+Enter to submit from anywhere in the form
        document.querySelector('.form-card').addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                e.preventDefault();
                submitRaceCall();
            }
        });

        function toast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => t.className = 'toast', 2500);
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function fmtDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        const typeLabels = {
            presidential: 'Pres', senate: 'Senate', house: 'House',
            governor: 'Gov', state_senate: 'St. Senate', state_house: 'St. House', other: 'Other'
        };

        function getFormData() {
            return {
                race: document.getElementById('rc-race').value.trim(),
                raceType: document.getElementById('rc-racetype').value,
                isPrimary: document.getElementById('rc-isprimary').checked,
                state: document.getElementById('rc-state').value,
                date: document.getElementById('rc-date').value,
                calledFor: document.getElementById('rc-calledfor').value.trim(),
                result: document.getElementById('rc-result').value,
                margin: document.getElementById('rc-margin').value !== '' ? parseFloat(document.getElementById('rc-margin').value) : null,
                firstCaller: document.getElementById('rc-vhfirst').checked ? 'votehub' : '',
                callers: { votehub: document.getElementById('rc-vhfirst').checked, ap: false, nyt: false, ddhq: false },
                notes: document.getElementById('rc-notes').value.trim()
            };
        }

        function clearForm() {
            document.getElementById('rc-race').value = '';
            document.getElementById('rc-racetype').value = 'house';
            document.getElementById('rc-isprimary').checked = false;
            // Keep state from last entry (likely same election night)
            document.getElementById('rc-state-group').style.display = '';
            document.getElementById('rc-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('rc-calledfor').value = '';
            document.getElementById('rc-result').value = 'pending';
            document.getElementById('rc-margin').value = '';
            document.getElementById('rc-vhfirst').checked = true;
            document.getElementById('rc-notes').value = '';
            document.getElementById('rc-race').focus();
        }

        function submitRaceCall() {
            const data = getFormData();
            if (!data.race || !data.date || !data.calledFor) {
                toast('Race, date, and candidate required', true);
                return;
            }

            const payload = {
                race: data.race, date: new Date(data.date).toISOString(),
                calledFor: data.calledFor, result: data.result, notes: data.notes,
                raceType: data.raceType, isPrimary: data.isPrimary, state: data.state,
                margin: data.margin, callers: data.callers, firstCaller: data.firstCaller
            };

            if (editingId) {
                fetch('/api/racecalls/' + editingId, {
                    method: 'PUT', headers: authHeaders(),
                    body: JSON.stringify(payload)
                }).then(r => {
                    if (!r.ok) throw new Error();
                    cancelEdit();
                    toast('Updated!');
                    loadRaceCalls();
                }).catch(() => toast('Failed to update', true));
            } else {
                fetch('/api/racecalls', {
                    method: 'POST', headers: authHeaders(),
                    body: JSON.stringify(payload)
                }).then(r => {
                    if (!r.ok) throw new Error();
                    clearForm();
                    toast('Race call added!');
                    loadRaceCalls();
                }).catch(() => toast('Failed to add', true));
            }
        }

        function editRaceCall(id) {
            fetch('/api/racecalls').then(r => r.json()).then(calls => {
                const c = calls.find(x => x.id === id);
                if (!c) return toast('Not found', true);
                editingId = id;
                document.getElementById('rc-race').value = c.race || '';
                document.getElementById('rc-racetype').value = c.raceType || 'other';
                document.getElementById('rc-isprimary').checked = !!c.isPrimary;
                document.getElementById('rc-state').value = c.state || '';
                document.getElementById('rc-state-group').style.display = (c.raceType === 'presidential') ? 'none' : '';
                document.getElementById('rc-date').value = c.date ? c.date.split('T')[0] : '';
                document.getElementById('rc-calledfor').value = c.calledFor || '';
                document.getElementById('rc-result').value = c.result || 'pending';
                document.getElementById('rc-margin').value = c.margin != null ? c.margin : '';
                document.getElementById('rc-vhfirst').checked = c.firstCaller === 'votehub';
                document.getElementById('rc-notes').value = c.notes || '';

                document.getElementById('rc-submit-btn').textContent = 'Update Call';
                document.getElementById('rc-cancel-edit-btn').style.display = '';
                document.getElementById('rc-form-title').textContent = 'Editing Race Call';
                document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
            });
        }

        function cancelEdit() {
            editingId = null;
            clearForm();
            document.getElementById('rc-submit-btn').textContent = 'Add Call';
            document.getElementById('rc-cancel-edit-btn').style.display = 'none';
            document.getElementById('rc-form-title').textContent = 'New Race Call';
        }

        function deleteRaceCall(id) {
            if (!confirm('Delete this race call?')) return;
            fetch('/api/racecalls/' + id, { method: 'DELETE', headers: authHeaders() })
                .then(r => { if (!r.ok) throw new Error(); toast('Deleted'); loadRaceCalls(); })
                .catch(() => toast('Failed to delete', true));
        }

        function loadRaceCalls() {
            fetch('/api/racecalls').then(r => r.json()).then(calls => {
                document.getElementById('rc-count').textContent = calls.length;
                const list = document.getElementById('rc-list');
                if (!calls.length) {
                    list.innerHTML = '<div class="empty-state">No race calls yet.</div>';
                    return;
                }

                list.innerHTML = calls.map(c => {
                    const badge = c.result === 'correct' ? '\u2705' : c.result === 'incorrect' ? '\u274C' : '\u23F3';
                    const typePill = c.raceType ? '<span class="pill">' + esc(typeLabels[c.raceType] || c.raceType) + '</span>' : '';
                    const statePill = c.state ? '<span class="pill">' + esc(c.state) + '</span>' : '';
                    const primaryPill = c.isPrimary ? '<span class="pill">Primary</span>' : '';
                    const firstStar = (c.firstCaller === 'votehub') ? '<span class="first-star" title="VoteHub first call">\u2605</span>' : '';
                    const marginText = c.margin != null ? ' \u00b7 +' + c.margin + ' pts' : '';

                    return `<div class="rc-card">
                        <span class="rc-card-badge">${badge}</span>
                        <div class="rc-card-body">
                            <div class="rc-card-title">
                                ${esc(c.race)}${firstStar}${typePill}${statePill}${primaryPill}
                            </div>
                            <div class="rc-card-meta">
                                ${esc(c.calledFor)} \u00b7 ${fmtDate(c.date)} \u00b7 ${c.result}${marginText}${c.notes ? ' \u00b7 ' + esc(c.notes) : ''}
                            </div>
                        </div>
                        <div class="rc-card-actions">
                            <button class="rc-card-btn" onclick="editRaceCall('${c.id}')">Edit</button>
                            <button class="rc-card-btn delete" onclick="deleteRaceCall('${c.id}')">Delete</button>
                        </div>
                    </div>`;
                }).join('');
            });
        }
    </script>
</body>
</html>
