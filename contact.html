<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Ryan McComb</title>
  <meta name="description" content="Get in touch with Ryan McComb. Contact information, interests, and skills.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>

  <nav class="site-nav" id="site-nav"></nav>

  <main>
    <div class="contact-page">
      <header class="page-header" >
        <h1>Contact</h1>
        <p>Get in touch or find me online.</p>
      </header>

      <div class="contact-grid stagger-children">
        <a href="mailto:rymccmcomb1@icloud.com" class="contact-item" data-copy="rymccmcomb1@icloud.com">
          <span class="contact-label">Email</span>
          <span class="contact-value">rymccmcomb1@icloud.com</span>
          <span class="copied-toast">Copied!</span>
        </a>

        <a href="https://github.com/de-bayes" class="contact-item" target="_blank" rel="noopener">
          <span class="contact-label">GitHub</span>
          <span class="contact-value">@de-bayes</span>
        </a>

        <a href="https://manifold.markets/JeromeHPowell" class="contact-item" target="_blank" rel="noopener">
          <span class="contact-label">Manifold Markets</span>
          <span class="contact-value">@JeromeHPowell</span>
        </a>

        <a href="https://www.linkedin.com/in/ryan-mccomb" class="contact-item" target="_blank" rel="noopener">
          <span class="contact-label">LinkedIn</span>
          <span class="contact-value">Ryan McComb</span>
        </a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    &copy; 2026 Ryan McComb &middot; Evanston, IL
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/effects.js"></script>
  <script>
    // Copy-to-clipboard on email click
    document.querySelectorAll('[data-copy]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const text = el.dataset.copy;
        navigator.clipboard.writeText(text).then(() => {
          const toast = el.querySelector('.copied-toast');
          if (toast) {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
          }
        });
      });
    });
  </script>
</body>
</html>
