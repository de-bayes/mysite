<!DOCTYPE html>
<html lang="en">
<head>

    <title>Contact - Ryan McComb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* NAV TABS */
        nav {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 100;
        }

        .nav-tabs {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-tabs a {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.02em;
        }

        .nav-tabs a:hover,
        .nav-tabs a.active {
            color: #000000;
        }

        /* PAGE CONTENT */
        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .page-title {
            font-family: 'VT323', monospace;
            font-size: 5rem;
            color: #e67e22;
            margin-bottom: 3rem;
            text-align: center;
        }

        .contact-content {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .contact-link {
            padding: 1.5rem;
            border: 1px solid #e5e5e5;
            text-decoration: none;
            color: #000000;
            transition: all 0.2s ease;
            display: block;
        }

        .contact-link:hover {
            border-color: #000000;
            transform: translateX(4px);
        }

        .contact-link h3 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .contact-link p {
            font-size: 0.9rem;
            color: #555555;
        }

        @media (max-width: 600px) {
            nav {
                top: 1rem;
                right: 1rem;
            }

            .nav-tabs {
                gap: 1rem;
            }

            .nav-tabs a {
                font-size: 0.65rem;
            }

            .page-title {
                font-size: 3.5rem;
            }

            .page-container {
                padding: 3rem 1.5rem;
            }
        }
    </style>
</head>

</html>
