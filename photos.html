        * {
            margin: 0;

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

            top: 0;

        /* NAV TABS */
        nav {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 100;
        }

        .nav-tabs {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-tabs a {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.02em;
        }

        .nav-tabs a:hover,
        .nav-tabs a.active {
            color: #000000;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 101;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #888888;
            transition: all 0.3s ease;
        }

        .hamburger:hover span {
            background: #000000;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        @media (max-width: 600px) {
            .hamburger {
                display: flex;
            }

            .nav-tabs {
                position: fixed;
                top: 0;
                right: 0;
                width: 200px;
                height: 100vh;
                background: #faf8f5;
                flex-direction: column;
                padding: 5rem 2rem 2rem;
                gap: 1.5rem;
                box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }

            .nav-tabs.open {
                transform: translateX(0);
            }

            .nav-tabs a {
                font-size: 1rem;
            }
        }

        /* PAGE CONTENT */
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .page-title {
            font-family: 'VT323', monospace;
            font-size: 5rem;
            color: #e67e22;
            margin-bottom: 3rem;
            text-align: center;
        }

        /* FEATURED FILM */
        .featured-film {
            margin-bottom: 4rem;
            border: 1px solid #e5e5e5;
            padding: 3rem;
            background: #fafafa;
        }

        .featured-film h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .film-video {
            width: 100%;
            aspect-ratio: 16/9;
            margin-bottom: 1rem;
            border: 1px solid #e5e5e5;
        }

        .featured-film p {
            font-size: 0.95rem;
            color: #555555;
        }

        /* PHOTO GALLERY */
        .section-subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            font-weight: 500;
            margin: 3rem 0 2rem;
            text-align: center;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .photo-item {
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, #f5f5f5 0%, #e5e5e5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e5e5e5;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .photo-item:hover {
            border-color: #000000;
            transform: scale(1.02);
        }

        .photo-item span {
            font-size: 2rem;
        }

        @media (max-width: 600px) {
            nav {
                top: 1rem;
                right: 1rem;
            }

            .nav-tabs {
                gap: 1rem;
            }

            .nav-tabs a {

            }

            .page-title {

            .page-container {

            }

            .featured-film {
                padding: 2rem;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script>
        // HAMBURGER MENU
        function toggleNav() {
            document.querySelector('.hamburger').classList.toggle('active');
            document.querySelector('.nav-tabs').classList.toggle('open');
        }

        document.querySelectorAll('.nav-tabs a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.hamburger').classList.remove('active');
                document.querySelector('.nav-tabs').classList.remove('open');
            });
        });

        // Analytics
        fetch('/api/track', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event: 'pageview', value: 'photos' }) }).catch(() => {});

        // Redirect to home on refresh
        const perfData = performance.getEntriesByType('navigation')[0];
        if (perfData && perfData.type === 'reload') {
            window.location.href = 'index.html';
        }

        // Interactive grid
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        let mouseX = -1000, mouseY = -1000, targetMouseX = -1000, targetMouseY = -1000;
        const gridSize = 40, influence = 280, maxDisplacement = 15, smoothing = 0.06;
        let pointsState = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            pointsState = null;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.addEventListener('mousemove', e => { targetMouseX = e.clientX; targetMouseY = e.clientY; });
        document.addEventListener('mouseleave', () => { targetMouseX = targetMouseY = -1000; });
        document.addEventListener('touchmove', e => { if (e.touches.length) { targetMouseX = e.touches[0].clientX; targetMouseY = e.touches[0].clientY; } }, { passive: true });
        document.addEventListener('touchend', () => { targetMouseX = targetMouseY = -1000; });

        function drawGrid() {
            mouseX += (targetMouseX - mouseX) * smoothing;
            mouseY += (targetMouseY - mouseY) * smoothing;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.055)';
            ctx.lineWidth = 1;
            const cols = Math.ceil(canvas.width / gridSize) + 1;
            const rows = Math.ceil(canvas.height / gridSize) + 1;
            if (!pointsState || pointsState.length !== rows + 1) {
                pointsState = [];
                for (let row = 0; row <= rows; row++) {
                    pointsState[row] = [];
                    for (let col = 0; col <= cols; col++) {
                        pointsState[row][col] = { x: col * gridSize, y: row * gridSize };
                    }
                }
            }
            for (let row = 0; row <= rows; row++) {
                for (let col = 0; col <= cols; col++) {
                    const baseX = col * gridSize, baseY = row * gridSize;
                    let targetX = baseX, targetY = baseY;
                    const dx = baseX - mouseX, dy = baseY - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < influence && dist > 0) {
                        const falloff = 1 - dist / influence;
                        const force = falloff * falloff * falloff * maxDisplacement;
                        const angle = Math.atan2(dy, dx);
                        targetX = baseX + Math.cos(angle) * force;
                        targetY = baseY + Math.sin(angle) * force;
                    }
                    pointsState[row][col].x += (targetX - pointsState[row][col].x) * 0.06;
                    pointsState[row][col].y += (targetY - pointsState[row][col].y) * 0.06;
                }
            }
            for (let row = 0; row <= rows; row++) {
                ctx.beginPath();
                ctx.moveTo(pointsState[row][0].x, pointsState[row][0].y);
                for (let col = 1; col <= cols; col++) {
                    const prev = pointsState[row][col - 1], curr = pointsState[row][col];
                    ctx.quadraticCurveTo(prev.x, prev.y, (prev.x + curr.x) / 2, (prev.y + curr.y) / 2);
                }
                ctx.stroke();
            }
            for (let col = 0; col <= cols; col++) {
                ctx.beginPath();
                ctx.moveTo(pointsState[0][col].x, pointsState[0][col].y);
                for (let row = 1; row <= rows; row++) {
                    const prev = pointsState[row - 1][col], curr = pointsState[row][col];
                    ctx.quadraticCurveTo(prev.x, prev.y, (prev.x + curr.x) / 2, (prev.y + curr.y) / 2);
                }
                ctx.stroke();
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();
    </script>

    <div class="power-toolbar">

    <script>document.querySelectorAll('.shortcut-key').forEach(el=>{el.textContent=navigator.platform.indexOf('Mac')>-1?'\u2318K':'Ctrl+K';});</script>
    <div class="cmd-palette-overlay" id="cmd-palette-overlay"><div class="cmd-palette"><div class="cmd-palette-input-wrap"><input type="text" class="cmd-palette-input" id="cmd-palette-input" placeholder="Type a command..." autocomplete="off" spellcheck="false"></div><div class="cmd-palette-results" id="cmd-palette-results"></div><div class="cmd-palette-footer"><span><kbd>↑↓</kbd> navigate</span><span><kbd>↵</kbd> select</span><span><kbd>esc</kbd> close</span></div></div></div>
    <script>
        const cmdItems=[{section:'Pages',icon:'\uD83C\uDFE0',label:'Home',action:()=>window.location.href='index.html'},{section:'Pages',icon:'\uD83D\uDCBC',label:'Experience',action:()=>window.location.href='experience.html'},{section:'Pages',icon:'\uD83D\uDCC1',label:'Projects',action:()=>window.location.href='projects.html'},{section:'Pages',icon:'\uD83D\uDCF7',label:'Photos',action:()=>window.location.href='photos.html'},{section:'Pages',icon:'\uD83C\uDF36\uFE0F',label:'Hot Takes',action:()=>window.location.href='hottakes.html'},{section:'Pages',icon:'\u23F3',label:'Countdowns',action:()=>window.location.href='countdowns.html'},{section:'Pages',icon:'\uD83D\uDCE7',label:'Contact',action:()=>window.location.href='contact.html'}];
        let cmdIdx=0,cmdFiltered=[...cmdItems];function openCmd(){const o=document.getElementById('cmd-palette-overlay');o.classList.add('active');const i=document.getElementById('cmd-palette-input');i.value='';cmdIdx=0;cmdFiltered=[...cmdItems];renderCmd();setTimeout(()=>i.focus(),50);}function closeCmd(){document.getElementById('cmd-palette-overlay').classList.remove('active');}function renderCmd(){const r=document.getElementById('cmd-palette-results');let h='',ls='';cmdFiltered.forEach((it,i)=>{if(it.section!==ls){h+='<div class="cmd-palette-section">'+it.section+'</div>';ls=it.section;}h+='<div class="cmd-palette-item'+(i===cmdIdx?' selected':'')+'" data-i="'+i+'"><span class="cmd-icon">'+it.icon+'</span><span class="cmd-label">'+it.label+'</span></div>';});if(!cmdFiltered.length)h='<div class="cmd-palette-empty">No results</div>';r.innerHTML=h;r.querySelectorAll('.cmd-palette-item').forEach(el=>{el.addEventListener('click',()=>{closeCmd();cmdFiltered[+el.dataset.i].action();});el.addEventListener('mouseenter',()=>{cmdIdx=+el.dataset.i;r.querySelectorAll('.cmd-palette-item').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');});});}
        document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('cmd-palette-overlay').classList.contains('active')?closeCmd():openCmd();}});document.getElementById('cmd-palette-input').addEventListener('input',e=>{const q=e.target.value.toLowerCase();cmdFiltered=cmdItems.filter(i=>i.label.toLowerCase().includes(q)||i.section.toLowerCase().includes(q));cmdIdx=0;renderCmd();});document.getElementById('cmd-palette-input').addEventListener('keydown',e=>{if(e.key==='Escape'){closeCmd();e.preventDefault();}else if(e.key==='ArrowDown'){e.preventDefault();cmdIdx=Math.min(cmdIdx+1,cmdFiltered.length-1);renderCmd();}else if(e.key==='ArrowUp'){e.preventDefault();cmdIdx=Math.max(cmdIdx-1,0);renderCmd();}else if(e.key==='Enter'){e.preventDefault();if(cmdFiltered[cmdIdx]){closeCmd();cmdFiltered[cmdIdx].action();}}});document.getElementById('cmd-palette-overlay').addEventListener('click',e=>{if(e.target.id==='cmd-palette-overlay')closeCmd();});
        const ks=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];let ki=0;document.addEventListener('keydown',e=>{if(e.key===ks[ki]){ki++;if(ki===ks.length){ki=0;document.body.classList.add('konami-active');const cols=['#e67e22','#4ec9b0','#569cd6','#f48771','#ffbd2e','#cc66cc','#0f0'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'vw';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*1.5+'s';p.style.animationDuration=(2+Math.random()*2)+'s';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),5000);}setTimeout(()=>document.body.classList.remove('konami-active'),5000);}}else ki=0;});
        document.querySelectorAll('a[href$=".html"]').forEach(l=>{l.addEventListener('click',e=>{const h=l.getAttribute('href');if(h&&!l.target&&!e.metaKey&&!e.ctrlKey){e.preventDefault();document.body.classList.add('page-leaving');setTimeout(()=>window.location.href=h,300);}});});
        const sro=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('revealed');});},{threshold:0.1});document.querySelectorAll('.scroll-reveal,.scroll-stagger').forEach(el=>sro.observe(el));
        document.querySelectorAll('.tilt-card').forEach(c=>{c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;c.style.transform='perspective(800px) rotateX('+((y-r.height/2)/r.height*-8)+'deg) rotateY('+((x-r.width/2)/r.width*8)+'deg)';c.style.setProperty('--shine-x',(x/r.width*100)+'%');c.style.setProperty('--shine-y',(y/r.height*100)+'%');});c.addEventListener('mouseleave',()=>{c.style.transform='perspective(800px) rotateX(0) rotateY(0)';});});
    </script>
