<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Ryan McComb - Photos">
    <link rel="icon" type="image/webp" href="538mascot.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&family=VT323&display=swap" rel="stylesheet">
    <title>Photos - Ryan McComb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        #grid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .page-container {
            position: relative;
            z-index: 1;
        }

        /* NAV TABS */
        nav {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 100;
        }

        .nav-tabs {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-tabs a {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.02em;
        }

        .nav-tabs a:hover,
        .nav-tabs a.active {
            color: #000000;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 101;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #888888;
            transition: all 0.3s ease;
        }

        .hamburger:hover span {
            background: #000000;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        @media (max-width: 600px) {
            .hamburger {
                display: flex;
            }

            .nav-tabs {
                position: fixed;
                top: 0;
                right: 0;
                width: 200px;
                height: 100vh;
                background: #ffffff;
                flex-direction: column;
                padding: 5rem 2rem 2rem;
                gap: 1.5rem;
                box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }

            .nav-tabs.open {
                transform: translateX(0);
            }

            .nav-tabs a {
                font-size: 1rem;
            }
        }

        /* PAGE CONTENT */
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .page-title {
            font-family: 'VT323', monospace;
            font-size: 5rem;
            color: #e67e22;
            margin-bottom: 3rem;
            text-align: center;
        }

        /* FEATURED FILM */
        .featured-film {
            margin-bottom: 4rem;
            border: 1px solid #e5e5e5;
            padding: 3rem;
            background: #fafafa;
        }

        .featured-film h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .film-video {
            width: 100%;
            aspect-ratio: 16/9;
            margin-bottom: 1rem;
            border: 1px solid #e5e5e5;
        }

        .featured-film p {
            font-size: 0.95rem;
            color: #555555;
        }

        /* PHOTO GALLERY */
        .section-subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            font-weight: 500;
            margin: 3rem 0 2rem;
            text-align: center;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .photo-item {
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, #f5f5f5 0%, #e5e5e5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e5e5e5;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .photo-item:hover {
            border-color: #000000;
            transform: scale(1.02);
        }

        .photo-item span {
            font-size: 2rem;
        }

        @media (max-width: 600px) {
            nav {
                top: 1rem;
                right: 1rem;
            }

            .nav-tabs {
                gap: 1rem;
            }

            .nav-tabs a {
                font-size: 0.65rem;
            }

            .page-title {
                font-size: 3.5rem;
            }

            .page-container {
                padding: 6rem 1.5rem 3rem;
            }

            .featured-film {
                padding: 2rem;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <canvas id="grid-canvas"></canvas>

    <nav>
        <div class="hamburger" onclick="toggleNav()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-tabs">
            <li><a href="index.html">Home</a></li>
            <li><a href="experience.html">Experience</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="passions.html">Passions</a></li>
            <li><a href="photos.html" class="active">Photos</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <h1 class="page-title">Photos</h1>

        <div class="featured-film">
            <h2>Cabin Life</h2>
            <iframe class="film-video" src="https://drive.google.com/file/d/1cGeVPasHX9805irZzNxSby3EdJdb4xOA/preview" allow="autoplay" allowfullscreen></iframe>
            <p>A short film I made over Christmas 2025-2026.</p>
        </div>

        <h2 class="section-subtitle">Gallery</h2>

        <div class="photo-grid">
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
        </div>
    </div>

    <script>
        // HAMBURGER MENU
        function toggleNav() {
            document.querySelector('.hamburger').classList.toggle('active');
            document.querySelector('.nav-tabs').classList.toggle('open');
        }

        document.querySelectorAll('.nav-tabs a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.hamburger').classList.remove('active');
                document.querySelector('.nav-tabs').classList.remove('open');
            });
        });

        // Redirect to home on refresh
        const perfData = performance.getEntriesByType('navigation')[0];
        if (perfData && perfData.type === 'reload') {
            window.location.href = 'index.html';
        }

        // Interactive grid
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        let mouseX = -1000, mouseY = -1000, targetMouseX = -1000, targetMouseY = -1000;
        const gridSize = 40, influence = 150, maxDisplacement = 30, smoothing = 0.15;
        let pointsState = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            pointsState = null;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.addEventListener('mousemove', e => { targetMouseX = e.clientX; targetMouseY = e.clientY; });
        document.addEventListener('mouseleave', () => { targetMouseX = targetMouseY = -1000; });
        document.addEventListener('touchmove', e => { if (e.touches.length) { targetMouseX = e.touches[0].clientX; targetMouseY = e.touches[0].clientY; } }, { passive: true });
        document.addEventListener('touchend', () => { targetMouseX = targetMouseY = -1000; });

        function drawGrid() {
            mouseX += (targetMouseX - mouseX) * smoothing;
            mouseY += (targetMouseY - mouseY) * smoothing;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.055)';
            ctx.lineWidth = 1;
            const cols = Math.ceil(canvas.width / gridSize) + 1;
            const rows = Math.ceil(canvas.height / gridSize) + 1;
            if (!pointsState || pointsState.length !== rows + 1) {
                pointsState = [];
                for (let row = 0; row <= rows; row++) {
                    pointsState[row] = [];
                    for (let col = 0; col <= cols; col++) {
                        pointsState[row][col] = { x: col * gridSize, y: row * gridSize };
                    }
                }
            }
            for (let row = 0; row <= rows; row++) {
                for (let col = 0; col <= cols; col++) {
                    const baseX = col * gridSize, baseY = row * gridSize;
                    let targetX = baseX, targetY = baseY;
                    const dx = baseX - mouseX, dy = baseY - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < influence && dist > 0) {
                        const force = Math.pow(1 - dist / influence, 2) * maxDisplacement * 0.6;
                        const angle = Math.atan2(dy, dx);
                        targetX = baseX + Math.cos(angle) * force;
                        targetY = baseY + Math.sin(angle) * force;
                    }
                    pointsState[row][col].x += (targetX - pointsState[row][col].x) * 0.2;
                    pointsState[row][col].y += (targetY - pointsState[row][col].y) * 0.2;
                }
            }
            for (let row = 0; row <= rows; row++) {
                ctx.beginPath();
                ctx.moveTo(pointsState[row][0].x, pointsState[row][0].y);
                for (let col = 1; col <= cols; col++) {
                    const prev = pointsState[row][col - 1], curr = pointsState[row][col];
                    ctx.quadraticCurveTo(prev.x, prev.y, (prev.x + curr.x) / 2, (prev.y + curr.y) / 2);
                }
                ctx.stroke();
            }
            for (let col = 0; col <= cols; col++) {
                ctx.beginPath();
                ctx.moveTo(pointsState[0][col].x, pointsState[0][col].y);
                for (let row = 1; row <= rows; row++) {
                    const prev = pointsState[row - 1][col], curr = pointsState[row][col];
                    ctx.quadraticCurveTo(prev.x, prev.y, (prev.x + curr.x) / 2, (prev.y + curr.y) / 2);
                }
                ctx.stroke();
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();
    </script>
</body>
</html>
