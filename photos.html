<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Ryan McComb - Photos">
    <link rel="icon" type="image/webp" href="538mascot.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&family=VT323&display=swap" rel="stylesheet">
    <title>Photos - Ryan McComb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* NAV TABS */
        nav {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 100;
        }

        .nav-tabs {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-tabs a {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.02em;
        }

        .nav-tabs a:hover,
        .nav-tabs a.active {
            color: #000000;
        }

        /* PAGE CONTENT */
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .page-title {
            font-family: 'VT323', monospace;
            font-size: 5rem;
            color: #e67e22;
            margin-bottom: 3rem;
            text-align: center;
        }

        /* FEATURED FILM */
        .featured-film {
            margin-bottom: 4rem;
            border: 1px solid #e5e5e5;
            padding: 3rem;
            background: #fafafa;
        }

        .featured-film h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .film-video {
            width: 100%;
            aspect-ratio: 16/9;
            margin-bottom: 1rem;
            border: 1px solid #e5e5e5;
        }

        .featured-film p {
            font-size: 0.95rem;
            color: #555555;
        }

        /* PHOTO GALLERY */
        .section-subtitle {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2rem;
            font-weight: 500;
            margin: 3rem 0 2rem;
            text-align: center;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .photo-item {
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, #f5f5f5 0%, #e5e5e5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e5e5e5;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .photo-item:hover {
            border-color: #000000;
            transform: scale(1.02);
        }

        .photo-item span {
            font-size: 2rem;
        }

        @media (max-width: 600px) {
            nav {
                top: 1rem;
                right: 1rem;
            }

            .nav-tabs {
                gap: 1rem;
            }

            .nav-tabs a {
                font-size: 0.65rem;
            }

            .page-title {
                font-size: 3.5rem;
            }

            .page-container {
                padding: 6rem 1.5rem 3rem;
            }

            .featured-film {
                padding: 2rem;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul class="nav-tabs">
            <li><a href="index.html">Home</a></li>
            <li><a href="experience.html">Experience</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="passions.html">Passions</a></li>
            <li><a href="photos.html" class="active">Photos</a></li>
            <li><a href="education.html">Education</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <h1 class="page-title">Photos</h1>

        <div class="featured-film">
            <h2>Cabin Life</h2>
            <iframe class="film-video" src="https://drive.google.com/file/d/1cGeVPasHX9805irZzNxSby3EdJdb4xOA/preview" allow="autoplay" allowfullscreen></iframe>
            <p>A short film I made over Christmas 2025-2026.</p>
        </div>

        <h2 class="section-subtitle">Gallery</h2>

        <div class="photo-grid">
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
            <div class="photo-item"><span>📸</span></div>
        </div>
    </div>
</body>
</html>
