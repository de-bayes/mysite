<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Ryan McComb - Cloud Storage">
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <title>Cloud - Ryan McComb</title>
    <style>
        /* --- Blue editorial top bar --- */
        .cloud-top-bar {
            background: #2244cc;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        [data-theme="dark"] .cloud-top-bar {
            background: #0000DD;
        }

        .cloud-top-bar-left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .cloud-top-bar h1 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.04em;
            margin: 0;
        }

        .cloud-top-bar a {
            font-family: var(--font-sans);
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.2s;
        }

        .cloud-top-bar a:hover {
            color: #ffffff;
            text-decoration: none;
        }

        .page-container {
            position: relative;
            z-index: 1;
            min-height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem 2rem;
        }

        .login-box {
            width: min(380px, 100%);
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            background: var(--bg-card);
            border: var(--border-weight) solid var(--border-color);
            padding: 1.2rem;
        }

        input, button { font: inherit; }

        .field {
            width: 100%;
            padding: 0.72rem 0.86rem;
            border: var(--border-weight) solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: var(--font-sans);
        }

        .field:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            padding: 0.72rem 0.86rem;
            font-family: var(--font-sans);
        }

        .btn:hover { opacity: 0.85; }

        .login-error { color: #b07070; min-height: 1.1rem; font-size: 0.9rem; }

        .cloud-ui {
            display: none;
            width: min(1100px, 100%);
            background: var(--bg-card);
            border: var(--border-weight) solid var(--border-color);
            overflow: hidden;
        }

        .cloud-layout { display: flex; min-height: 560px; }

        .sidebar {
            width: 260px;
            border-right: var(--border-weight) solid var(--border-color);
            background: var(--bg-secondary);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .panel {
            border: var(--border-weight) solid var(--border-color);
            background: var(--bg-card);
            padding: 0.8rem;
        }

        .panel h3 {
            font-family: var(--font-sans);
            font-size: 0.78rem;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .small { color: var(--text-muted); font-size: 0.84rem; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .toolbar {
            padding: 1rem 1.1rem;
            border-bottom: var(--border-weight) solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-title { font-size: 1.05rem; font-weight: 600; }
        .breadcrumbs { color: var(--text-muted); font-size: 0.9rem; }
        .breadcrumbs a { color: var(--accent); text-decoration: none; }
        .breadcrumbs a:hover { text-decoration: underline; }

        .toolbar-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

        .btn-lite {
            border: var(--border-weight) solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.5rem 0.72rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: var(--font-sans);
        }

        .btn-lite:hover { background: var(--bg-secondary); }

        .drop-zone {
            margin: 1rem 1.1rem;
            border: 2px dashed var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-muted);
            text-align: center;
            padding: 0.95rem;
            position: relative;
            cursor: pointer;
        }

        .drop-zone.dragover {
            border-color: var(--accent);
        }

        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .table-wrap { padding: 0 1.1rem 0.8rem; overflow: auto; }

        table { width: 100%; border-collapse: collapse; }
        th, td {
            text-align: left;
            padding: 0.72rem 0.45rem;
            border-bottom: var(--border-weight) solid var(--border-color);
            font-size: 0.92rem;
            white-space: nowrap;
        }

        th { color: var(--text-muted); font-weight: 500; }

        .entry-name { display: flex; align-items: center; gap: 0.45rem; }
        .name-btn {
            border: none;
            background: none;
            color: var(--text-primary);
            cursor: pointer;
            font: inherit;
            padding: 0;
            text-align: left;
        }

        .name-btn.folder { color: var(--accent); font-weight: 600; }
        .name-btn:hover { text-decoration: underline; }

        .actions { display: flex; gap: 0.45rem; }
        .actions button {
            border: var(--border-weight) solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.32rem 0.5rem;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: var(--font-sans);
        }

        .actions .danger { color: #b07070; border-color: #b07070; }
        .status { padding: 0.2rem 1.1rem 1rem; min-height: 1.2rem; color: var(--text-muted); font-size: 0.88rem; }

        .backup-form { display: flex; flex-direction: column; gap: 0.45rem; }
        .backup-form .field { margin: 0; font-size: 0.88rem; padding: 0.54rem 0.62rem; }

        @media (max-width: 900px) {
            .cloud-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: var(--border-weight) solid var(--border-color); }
        }

        /* --- Editorial Footer --- */
        .cloud-editorial-footer {
            border-top: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            width: 100%;
        }

        .cloud-editorial-footer nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem 1.2rem;
            margin-bottom: 1rem;
        }

        .cloud-editorial-footer nav a {
            font-family: var(--font-sans);
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s ease;
        }

        .cloud-editorial-footer nav a:hover {
            color: var(--text-primary);
            text-decoration: none;
        }

        .cloud-editorial-footer .footer-copy {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            color: var(--text-light);
            letter-spacing: 0.03em;
        }

        @media (max-width: 600px) {
            .cloud-top-bar { padding: 1rem 1.25rem; }
            .cloud-top-bar h1 { font-size: 1.1rem; }
            .page-container { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
<script>
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
</script>

<div class="cloud-top-bar">
    <div class="cloud-top-bar-left">
        <h1>CLOUD STORAGE</h1>
        <a href="index.html">&larr; Back to site</a>
    </div>
</div>

<div class="page-container">

    <section id="loginBox" class="login-box">
        <input id="passwordInput" class="field" type="password" autocomplete="current-password" placeholder="Cloud password">
        <button id="loginBtn" class="btn">Log in</button>
        <div id="loginError" class="login-error"></div>
    </section>

    <section id="cloudUi" class="cloud-ui">
        <div class="cloud-layout">
            <aside class="sidebar">
                <div class="panel">
                    <h3>Navigation</h3>
                    <button id="homeBtn" class="btn-lite" style="width:100%;">All files</button>
                    <div id="pathText" class="small" style="margin-top:.45rem;">Current: /</div>
                </div>

                <div class="panel">
                    <h3>GitHub backup</h3>
                    <form id="backupForm" class="backup-form">
                        <input id="repoInput" class="field" placeholder="owner/repo" required>
                        <input id="branchInput" class="field" placeholder="branch (optional)">
                        <input id="tokenInput" class="field" type="password" placeholder="token (optional)">
                        <button class="btn-lite" type="submit">Backup into current folder</button>
                    </form>
                    <p class="small" style="margin-top:.5rem;">Creates a ZIP snapshot via GitHub API.</p>
                </div>

                <div class="panel">
                    <h3>Session</h3>
                    <button id="logoutBtn" class="btn-lite" style="width:100%;">Log out</button>
                </div>
            </aside>

            <main class="main">
                <div class="toolbar">
                    <div>
                        <div class="toolbar-title">My Storage</div>
                        <div id="breadcrumbs" class="breadcrumbs"></div>
                    </div>
                    <div class="toolbar-actions">
                        <button id="newFolderBtn" class="btn-lite">New folder</button>
                        <button id="refreshBtn" class="btn-lite">Refresh</button>
                    </div>
                </div>

                <label id="dropZone" class="drop-zone">
                    Drag and drop files here, or click to upload to this folder.
                    <input id="fileInput" type="file" multiple>
                </label>

                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Size</th>
                            <th>Modified</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody id="fileTableBody"></tbody>
                    </table>
                </div>
                <div id="status" class="status"></div>
            </main>
        </div>
    </section>

    <footer class="cloud-editorial-footer">
        <nav>
            <a href="index.html">Home</a>
            <a href="index.html#experience">Work</a>
            <a href="index.html#projects">Projects</a>
            <a href="index.html#blog">Writing</a>
            <a href="index.html#contact">Contact</a>
        </nav>
        <div class="footer-copy">&copy; 2026 Ryan McComb &middot; Evanston, IL</div>
    </footer>
</div>

<script>
    const loginBox = document.getElementById('loginBox');
    const cloudUi = document.getElementById('cloudUi');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');

    const homeBtn = document.getElementById('homeBtn');
    const newFolderBtn = document.getElementById('newFolderBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileTableBody = document.getElementById('fileTableBody');
    const status = document.getElementById('status');
    const breadcrumbs = document.getElementById('breadcrumbs');
    const pathText = document.getElementById('pathText');

    const backupForm = document.getElementById('backupForm');
    const repoInput = document.getElementById('repoInput');
    const branchInput = document.getElementById('branchInput');
    const tokenInput = document.getElementById('tokenInput');

    let currentPath = '';

    const getToken = () => sessionStorage.getItem('cloudToken');
    const authHeaders = (json = false) => {
        const headers = { Authorization: 'Bearer ' + getToken() };
        if (json) headers['Content-Type'] = 'application/json';
        return headers;
    };

    function showLogin() {
        cloudUi.style.display = 'none';
        loginBox.style.display = 'flex';
        passwordInput.focus();
    }

    function showCloud() {
        loginBox.style.display = 'none';
        cloudUi.style.display = 'block';
        loadFiles();
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function joinPath(base, name) { return base ? `${base}/${name}` : name; }

    function formatSize(bytes) {
        if (bytes === null || bytes === undefined) return '--';
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 ** 2) return `${(bytes / 1024).toFixed(1)} KB`;
        if (bytes < 1024 ** 3) return `${(bytes / 1024 ** 2).toFixed(1)} MB`;
        return `${(bytes / 1024 ** 3).toFixed(1)} GB`;
    }

    function formatDate(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? '--' : date.toLocaleString();
    }

    function setStatus(message, isError = false) {
        status.textContent = message;
        status.style.color = isError ? '#b07070' : 'var(--text-muted)';
    }

    async function login() {
        loginError.textContent = '';
        const password = passwordInput.value;
        if (!password) return;

        try {
            const response = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            if (!response.ok) {
                loginError.textContent = 'Wrong password.';
                return;
            }

            sessionStorage.setItem('cloudToken', password);
            showCloud();
        } catch {
            loginError.textContent = 'Connection error.';
        }
    }

    function logout() {
        sessionStorage.removeItem('cloudToken');
        currentPath = '';
        showLogin();
    }

    function renderBreadcrumbs(path) {
        const parts = path ? path.split('/') : [];
        const nodes = ['<a data-path="">Home</a>'];
        let walker = '';
        for (const part of parts) {
            walker = walker ? `${walker}/${part}` : part;
            nodes.push(` / <a data-path="${escapeHtml(walker)}">${escapeHtml(part)}</a>`);
        }
        breadcrumbs.innerHTML = nodes.join('');
    }

    async function loadFiles(targetPath = currentPath) {
        try {
            const query = targetPath ? '?path=' + encodeURIComponent(targetPath) : '';
            const response = await fetch('/api/files' + query, { headers: authHeaders() });
            if (response.status === 401) return logout();

            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Could not load files');

            currentPath = payload.path || '';
            pathText.textContent = 'Current: /' + currentPath;
            renderBreadcrumbs(currentPath);
            renderEntries(payload.entries || []);
            setStatus('');
        } catch (error) {
            fileTableBody.innerHTML = '<tr><td colspan="4" style="color:var(--text-muted)">Could not load files.</td></tr>';
            setStatus(error.message || 'Could not load files', true);
        }
    }

    function renderEntries(entries) {
        if (!entries.length) {
            fileTableBody.innerHTML = '<tr><td colspan="4" style="color:var(--text-muted)">This folder is empty.</td></tr>';
            return;
        }

        fileTableBody.innerHTML = entries.map((entry) => {
            const fullPath = joinPath(currentPath, entry.name);
            const isFolder = entry.type === 'folder';
            return `
                <tr>
                    <td>
                        <div class="entry-name">
                            <span>${isFolder ? '\uD83D\uDCC1' : '\uD83D\uDCC4'}</span>
                            <button class="name-btn ${isFolder ? 'folder' : ''}" data-action="${isFolder ? 'open' : 'download'}" data-path="${escapeHtml(fullPath)}">${escapeHtml(entry.name)}</button>
                        </div>
                    </td>
                    <td>${isFolder ? '--' : formatSize(entry.size)}</td>
                    <td>${formatDate(entry.modified)}</td>
                    <td>
                        <div class="actions">
                            ${isFolder
                                ? `<button data-action="open" data-path="${escapeHtml(fullPath)}">Open</button>`
                                : `<button data-action="download" data-path="${escapeHtml(fullPath)}">Download</button>`}
                            <button class="danger" data-action="delete" data-path="${escapeHtml(fullPath)}">Delete</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function uploadFiles(files) {
        if (!files.length) return;

        for (const file of files) {
            setStatus(`Uploading ${file.name}...`);
            const formData = new FormData();
            formData.append('file', file);

            try {
                const query = currentPath ? '?path=' + encodeURIComponent(currentPath) : '';
                const response = await fetch('/api/upload' + query, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: formData
                });
                if (response.status === 401) return logout();

                if (!response.ok) {
                    const payload = await response.json();
                    throw new Error(payload.error || `Upload failed for ${file.name}`);
                }
            } catch (error) {
                setStatus(error.message || 'Upload failed', true);
                return;
            }
        }

        fileInput.value = '';
        setStatus('Upload complete.');
        loadFiles();
    }

    function downloadFile(path) {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/files/' + encodeURIComponent(path).replace(/%2F/g, '/'), true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + getToken());
        xhr.responseType = 'blob';

        xhr.onload = function () {
            if (xhr.status === 401) return logout();
            if (xhr.status !== 200) return setStatus('Download failed', true);

            const filename = path.split('/').pop();
            const url = URL.createObjectURL(xhr.response);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        };

        xhr.send();
    }

    async function deleteEntry(path) {
        if (!confirm(`Delete "${path}"?`)) return;

        try {
            const response = await fetch('/api/files/' + encodeURIComponent(path).replace(/%2F/g, '/'), {
                method: 'DELETE',
                headers: authHeaders()
            });
            if (response.status === 401) return logout();

            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Delete failed');

            setStatus('Deleted.');
            loadFiles();
        } catch (error) {
            setStatus(error.message || 'Delete failed', true);
        }
    }

    async function createFolder() {
        const name = prompt('Folder name:');
        if (!name) return;

        try {
            const response = await fetch('/api/folders', {
                method: 'POST',
                headers: authHeaders(true),
                body: JSON.stringify({ path: currentPath, name })
            });
            if (response.status === 401) return logout();

            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Could not create folder');

            setStatus(`Created folder ${name}`);
            loadFiles();
        } catch (error) {
            setStatus(error.message || 'Could not create folder', true);
        }
    }

    async function backupGithubRepo(event) {
        event.preventDefault();
        const repo = repoInput.value.trim();
        const branch = branchInput.value.trim();
        const token = tokenInput.value.trim();
        if (!repo) return;

        setStatus(`Backing up ${repo}...`);

        try {
            const response = await fetch('/api/github-backup', {
                method: 'POST',
                headers: authHeaders(true),
                body: JSON.stringify({ repo, branch, token, path: currentPath })
            });
            if (response.status === 401) return logout();

            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Backup failed');

            setStatus(`Backup saved: ${payload.name}`);
            backupForm.reset();
            loadFiles();
        } catch (error) {
            setStatus(error.message || 'Backup failed', true);
        }
    }

    loginBtn.addEventListener('click', login);
    passwordInput.addEventListener('keydown', (event) => event.key === 'Enter' && login());
    logoutBtn.addEventListener('click', logout);

    homeBtn.addEventListener('click', () => loadFiles(''));
    newFolderBtn.addEventListener('click', createFolder);
    refreshBtn.addEventListener('click', () => loadFiles());

    fileInput.addEventListener('change', () => uploadFiles(fileInput.files));
    dropZone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropZone.classList.remove('dragover');
        uploadFiles(event.dataTransfer.files);
    });

    backupForm.addEventListener('submit', backupGithubRepo);

    fileTableBody.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const action = button.dataset.action;
        const path = button.dataset.path;
        if (action === 'open') loadFiles(path);
        if (action === 'download') downloadFile(path);
        if (action === 'delete') deleteEntry(path);
    });

    breadcrumbs.addEventListener('click', (event) => {
        const crumb = event.target.closest('[data-path]');
        if (!crumb) return;
        loadFiles(crumb.dataset.path || '');
    });

    if (getToken()) showCloud();
</script>
</body>
</html>
