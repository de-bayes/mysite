<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Ryan McComb - Cloud Storage">
    <link rel="icon" type="image/webp" href="538mascot.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&family=VT323&display=swap" rel="stylesheet">
    <title>Cloud - Ryan McComb</title>
    <link rel="stylesheet" href="features.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf8f5;
            color: #000000;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            position: relative;
        }

        #polar-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .page-container {
            position: relative;
            z-index: 1;
        }

        /* NAV TABS */
        nav {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 100;
        }

        .nav-tabs {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-tabs a {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.02em;
        }

        .nav-tabs a:hover,
        .nav-tabs a.active {
            color: #000000;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 101;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #888888;
            transition: all 0.3s ease;
        }

        .hamburger:hover span {
            background: #000000;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        @media (max-width: 600px) {
            .hamburger {
                display: flex;
            }

            .nav-tabs {
                position: fixed;
                top: 0;
                right: 0;
                width: 200px;
                height: 100vh;
                background: #faf8f5;
                flex-direction: column;
                padding: 5rem 2rem 2rem;
                gap: 1.5rem;
                box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }

            .nav-tabs.open {
                transform: translateX(0);
            }

            .nav-tabs a {
                font-size: 1rem;
            }
        }

        /* PAGE CONTENT */
        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .page-title {
            font-family: 'VT323', monospace;
            font-size: 5rem;
            color: #e67e22;
            margin-bottom: 3rem;
            text-align: center;
        }

        /* LOGIN */
        .login-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            max-width: 320px;
            width: 100%;
        }

        .login-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-box input:focus {
            border-color: #e67e22;
        }

        .login-box button {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #e67e22;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-box button:hover {
            background: #cf6d17;
        }

        .login-error {
            color: #d32f2f;
            font-size: 0.85rem;
            min-height: 1.2em;
        }

        /* CLOUD UI */
        .cloud-ui {
            max-width: 600px;
            width: 100%;
        }

        .drop-zone {
            border: 2px dashed #e5e5e5;
            border-radius: 8px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 2rem;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #e67e22;
            background: rgba(230, 126, 34, 0.04);
        }

        .drop-zone-text {
            font-size: 0.95rem;
            color: #888;
        }

        .drop-zone-text strong {
            color: #e67e22;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-progress {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.5rem;
            min-height: 1.2em;
        }

        /* FILE LIST */
        .file-list {
            list-style: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 0;
            border-bottom: 1px solid #e5e5e5;
        }

        .file-item:first-child {
            border-top: 1px solid #e5e5e5;
        }

        .file-info {
            min-width: 0;
            flex: 1;
        }

        .file-name {
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.8rem;
            color: #888;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
            margin-left: 1rem;
            flex-shrink: 0;
        }

        .file-actions button {
            background: none;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            padding: 0.35rem 0.65rem;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #555;
        }

        .file-actions button:hover {
            border-color: #e67e22;
            color: #e67e22;
        }

        .file-actions button.delete-btn:hover {
            border-color: #d32f2f;
            color: #d32f2f;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #888;
            font-size: 0.95rem;
        }

        .logout-btn {
            margin-top: 2rem;
            background: none;
            border: none;
            color: #888;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .logout-btn:hover {
            color: #555;
        }

        @media (max-width: 600px) {
            nav {
                top: 1rem;
                right: 1rem;
            }

            .nav-tabs {
                gap: 1rem;
            }

            .nav-tabs a {
                font-size: 0.65rem;
            }

            .page-title {
                font-size: 3.5rem;
            }

            .page-container {
                padding: 3rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="hamburger" onclick="toggleNav()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-tabs">
            <li><a href="index.html">Home</a></li>

            <li><a href="projects.html">Projects</a></li>

    <div class="page-container">
        <h1 class="page-title">My Personal Cloud</h1>

        <!-- LOGIN STATE -->
        <div class="login-box" id="login-box">
            <input type="password" id="password-input" placeholder="Password" autocomplete="off">
            <button onclick="login()">Unlock</button>
            <div class="login-error" id="login-error"></div>

        <!-- AUTHENTICATED STATE -->

    <script>
        // NAV
        function toggleNav(){
            document.querySelector('.hamburger').classList.toggle('active');
            document.querySelector('.nav-tabs').classList.toggle('open');
        }
        document.querySelectorAll('.nav-tabs a').forEach(l=>{l.addEventListener('click',()=>{document.querySelector('.hamburger').classList.remove('active');document.querySelector('.nav-tabs').classList.remove('open');});});

        // POLAR GRID
        const cv=document.getElementById('polar-grid'),ctx=cv.getContext('2d');
        function drawPolarGrid(){
            cv.width=window.innerWidth;cv.height=window.innerHeight;
            const cx=cv.width/2,cy=cv.height/2,max=Math.hypot(cx,cy);
            ctx.strokeStyle='rgba(0,0,0,0.045)';ctx.lineWidth=0.5;
            for(let r=40;r<max;r+=40){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();}
            for(let a=0;a<360;a+=15){const rad=a*Math.PI/180;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(rad)*max,cy+Math.sin(rad)*max);ctx.stroke();}
            const drift=[{x:Math.sin(Date.now()*0.0003)*8,y:Math.cos(Date.now()*0.0004)*6},{x:Math.cos(Date.now()*0.0005)*10,y:Math.sin(Date.now()*0.0003)*8},{x:Math.sin(Date.now()*0.0004)*6,y:Math.cos(Date.now()*0.0006)*10}];
            ctx.strokeStyle='rgba(230,126,34,0.12)';ctx.lineWidth=1.2;
            for(let i=0;i<3;i++){
                const x=cx+drift[i].x,y=cy+drift[i].y;
                ctx.beginPath();
                for(let r=0;r<max;r+=40){
                    const d=drift[r%3]||drift[0];
                    if(r===0)ctx.moveTo(x+d.x,y+d.y);
                    else ctx.lineTo(x+d.x,y+d.y);
                }
                ctx.stroke();
            }
            requestAnimationFrame(drawPolarGrid);
        }
        drawPolarGrid();
    </script>

    <!-- POWER TOOLBAR -->
    <div class="power-toolbar">
        <button class="power-btn" onclick="document.body.classList.toggle('dark-mode');localStorage.setItem('darkMode',document.body.classList.contains('dark-mode')?'enabled':'disabled');" aria-label="Toggle dark mode">
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="power-btn" id="crt-btn" onclick="document.body.classList.toggle('crt-mode');localStorage.setItem('crtMode',document.body.classList.contains('crt-mode')?'enabled':'disabled');this.classList.toggle('active',document.body.classList.contains('crt-mode'));">
            <span class="btn-label">CRT</span>
        </button>
        <button class="power-btn" onclick="openCmd()">
            <span class="btn-label"><kbd class="shortcut-key"></kbd> Search</span>
        </button>
    </div>
    <script>document.querySelectorAll('.shortcut-key').forEach(el=>{el.textContent=navigator.platform.indexOf('Mac')>-1?'\u2318K':'Ctrl+K';});</script>

    <!-- CRT + CMD PALETTE + KONAMI + PAGE TRANSITIONS -->
    <div class="crt-scanline"></div>
    <div class="crt-badge" onclick="document.body.classList.toggle('crt-mode')">CRT ON</div>
    <div class="cmd-palette-overlay" id="cmd-palette-overlay">
        <div class="cmd-palette">
            <div class="cmd-palette-input-wrap">
                <input type="text" class="cmd-palette-input" id="cmd-palette-input" placeholder="Type a command..." autocomplete="off" spellcheck="false">
            </div>
            <div class="cmd-palette-results" id="cmd-palette-results"></div>
            <div class="cmd-palette-footer"><span><kbd>↑↓</kbd> navigate</span><span><kbd>↵</kbd> select</span><span><kbd>esc</kbd> close</span></div>
        </div>
    </div>
    <script>
        // Restore CRT
        if (localStorage.getItem('crtMode') === 'enabled'){document.body.classList.add('crt-mode');const cb=document.getElementById('crt-btn');if(cb)cb.classList.add('active');}

        // Restore dark mode
        if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');

        // Command palette
        const cmdItems = [
            { section:'Pages', icon:'\uD83C\uDFE0', label:'Home', action:()=>window.location.href='index.html' },
            { section:'Pages', icon:'\uD83D\uDCBC', label:'Experience', action:()=>window.location.href='experience.html' },
            { section:'Pages', icon:'\uD83D\uDCC1', label:'Projects', action:()=>window.location.href='projects.html' },
            { section:'Pages', icon:'\uD83D\uDCF7', label:'Photos', action:()=>window.location.href='photos.html' },
            { section:'Pages', icon:'\uD83D\uDCDD', label:'Posts', action:()=>window.location.href='posts.html' },
            { section:'Pages', icon:'\uD83D\uDCE7', label:'Contact', action:()=>window.location.href='contact.html' },
            { section:'Pages', icon:'\u2601\uFE0F', label:'Cloud', action:()=>window.location.href='cloud.html' },
            { section:'Tools', icon:'\uD83C\uDF19', label:'Toggle Dark Mode', action:()=>{ document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')?'enabled':'disabled'); } },
        ];
        let cmdIdx=0, cmdFiltered=[...cmdItems];
        function openCmd(){const o=document.getElementById('cmd-palette-overlay');o.classList.add('active');const i=document.getElementById('cmd-palette-input');i.value='';cmdIdx=0;cmdFiltered=[...cmdItems];renderCmd();setTimeout(()=>i.focus(),50);}
        function closeCmd(){document.getElementById('cmd-palette-overlay').classList.remove('active');}
        function renderCmd(){const r=document.getElementById('cmd-palette-results');let h='',ls='';cmdFiltered.forEach((it,i)=>{if(it.section!==ls){h+='<div class="cmd-palette-section">'+it.section+'</div>';ls=it.section;}h+='<div class="cmd-palette-item'+(i===cmdIdx?' selected':'')+'" data-i="'+i+'"><span class="cmd-icon">'+it.icon+'</span><span class="cmd-label">'+it.label+'</span></div>';});if(!cmdFiltered.length)h='<div class="cmd-palette-empty">No results</div>';r.innerHTML=h;r.querySelectorAll('.cmd-palette-item').forEach(el=>{el.addEventListener('click',()=>{closeCmd();cmdFiltered[+el.dataset.i].action();});el.addEventListener('mouseenter',()=>{cmdIdx=+el.dataset.i;r.querySelectorAll('.cmd-palette-item').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');});});}
        document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('cmd-palette-overlay').classList.contains('active')?closeCmd():openCmd();}});
        document.getElementById('cmd-palette-input').addEventListener('input',e=>{const q=e.target.value.toLowerCase();cmdFiltered=cmdItems.filter(i=>i.label.toLowerCase().includes(q)||i.section.toLowerCase().includes(q));cmdIdx=0;renderCmd();});
        document.getElementById('cmd-palette-input').addEventListener('keydown',e=>{if(e.key==='Escape'){closeCmd();e.preventDefault();}else if(e.key==='ArrowDown'){e.preventDefault();cmdIdx=Math.min(cmdIdx+1,cmdFiltered.length-1);renderCmd();}else if(e.key==='ArrowUp'){e.preventDefault();cmdIdx=Math.max(cmdIdx-1,0);renderCmd();}else if(e.key==='Enter'){e.preventDefault();if(cmdFiltered[cmdIdx]){closeCmd();cmdFiltered[cmdIdx].action();}}});
        document.getElementById('cmd-palette-overlay').addEventListener('click',e=>{if(e.target.id==='cmd-palette-overlay')closeCmd();});

        // Konami code
        const ks=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];let ki=0;
        document.addEventListener('keydown',e=>{if(e.key===ks[ki]){ki++;if(ki===ks.length){ki=0;document.body.classList.add('konami-active');const cols=['#e67e22','#4ec9b0','#569cd6','#f48771','#ffbd2e','#cc66cc','#0f0'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'vw';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.animationDelay=Math.random()*1.5+'s';p.style.animationDuration=(2+Math.random()*2)+'s';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),5000);}setTimeout(()=>document.body.classList.remove('konami-active'),5000);}}else ki=0;});

        // Page transitions
        document.querySelectorAll('a[href$=".html"]').forEach(l=>{l.addEventListener('click',e=>{const h=l.getAttribute('href');if(h&&!l.target&&!e.metaKey&&!e.ctrlKey){e.preventDefault();document.body.classList.add('page-leaving');setTimeout(()=>window.location.href=h,300);}});});

        // Scroll reveals
        const sro=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('revealed');});},{threshold:0.1});
        document.querySelectorAll('.scroll-reveal,.scroll-stagger').forEach(el=>sro.observe(el));
    </script>

    <!-- CLOUD STORAGE LOGIC -->
    <script>
        const passwordInput = document.getElementById('password-input');
        const loginBox = document.getElementById('login-box');
        const cloudUi = document.getElementById('cloud-ui');
        const loginError = document.getElementById('login-error');
        const fileList = document.getElementById('file-list');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadProgress = document.getElementById('upload-progress');

        function getToken() { return sessionStorage.getItem('cloudToken'); }

        function authHeaders() {
            return { 'Authorization': 'Bearer ' + getToken() };
        }

        // Auto-login if token exists
        if (getToken()) showCloud();

        passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        async function login() {
            loginError.textContent = '';
            const pw = passwordInput.value;
            if (!pw) return;
            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                if (!res.ok) {
                    loginError.textContent = 'Wrong password';
                    return;
                }
                sessionStorage.setItem('cloudToken', pw);
                showCloud();
            } catch {
                loginError.textContent = 'Connection error';
            }
        }

        function logout() {
            sessionStorage.removeItem('cloudToken');
            loginBox.style.display = '';
            cloudUi.style.display = 'none';
            passwordInput.value = '';
        }

        function showCloud() {
            loginBox.style.display = 'none';
            cloudUi.style.display = '';
            loadFiles();
        }

        async function loadFiles() {
            try {
                const res = await fetch('/api/files', { headers: authHeaders() });
                if (res.status === 401) { logout(); return; }
                const files = await res.json();
                renderFiles(files);
            } catch {
                fileList.innerHTML = '<li class="empty-state">Could not load files</li>';
            }
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
            return (bytes / 1073741824).toFixed(1) + ' GB';
        }

        function renderFiles(files) {
            if (!files.length) {
                fileList.innerHTML = '<li class="empty-state">No files yet</li>';
                return;
            }
            fileList.innerHTML = files.map(f => `
                <li class="file-item">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(f.name)}</div>
                        <div class="file-meta">${formatSize(f.size)}</div>
                    </div>
                    <div class="file-actions">
                        <button onclick="downloadFile('${escapeAttr(f.name)}')">Download</button>
                        <button class="delete-btn" onclick="deleteFile('${escapeAttr(f.name)}')">Delete</button>
                    </div>
                </li>
            `).join('');
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function escapeAttr(s) {
            return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
        }

        function downloadFile(name) {
            const a = document.createElement('a');
            a.href = '/api/files/' + encodeURIComponent(name);
            // Use XMLHttpRequest to include auth header
            const xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/files/' + encodeURIComponent(name), true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + getToken());
            xhr.responseType = 'blob';
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const url = URL.createObjectURL(xhr.response);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = name;
                    a.click();
                    URL.revokeObjectURL(url);
                } else if (xhr.status === 401) {
                    logout();
                }
            };
            xhr.send();
        }

        async function deleteFile(name) {
            if (!confirm('Delete ' + name + '?')) return;
            const res = await fetch('/api/files/' + encodeURIComponent(name), {
                method: 'DELETE',
                headers: authHeaders()
            });
            if (res.status === 401) { logout(); return; }
            loadFiles();
        }

        // Upload via input or drag-and-drop
        fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            uploadFiles(e.dataTransfer.files);
        });

        async function uploadFiles(files) {
            for (const file of files) {
                uploadProgress.textContent = 'Uploading ' + file.name + '...';
                const form = new FormData();
                form.append('file', file);
                try {
                    const res = await fetch('/api/upload', {
                        method: 'POST',
                        headers: authHeaders(),
                        body: form
                    });
                    if (res.status === 401) { logout(); return; }
                } catch {
                    uploadProgress.textContent = 'Upload failed: ' + file.name;
                    return;
                }
            }
            uploadProgress.textContent = '';
            fileInput.value = '';
            loadFiles();
        }
    </script>
</body>
</html>
