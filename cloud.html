<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Ryan McComb - Cloud Storage">
    <link rel="icon" type="image/webp" href="538mascot.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=VT323&display=swap" rel="stylesheet">
    <title>Cloud - Ryan McComb</title>
    <link rel="stylesheet" href="features.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf8f5;
            color: #000;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        #polar-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .page-container { position: relative; z-index: 1; }

        nav { position: fixed; top: 1.5rem; right: 2rem; z-index: 100; }

        .nav-tabs { display: flex; gap: 1.5rem; list-style: none; }

        .nav-tabs > li { position: relative; }

        .nav-tabs a,
        .nav-dropdown-toggle {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888;
            text-decoration: none;
            transition: color .2s ease;
            letter-spacing: 0.02em;
            cursor: pointer;
        }

        .nav-tabs a:hover,
        .nav-tabs a.active,
        .nav-dropdown:hover > .nav-dropdown-toggle,
        .nav-dropdown-toggle.has-active { color: #000; }

        /* DROPDOWN */
        .nav-dropdown-toggle::after {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            border-right: 1px solid currentColor;
            border-bottom: 1px solid currentColor;
            transform: rotate(45deg);
            margin-left: 4px;
            vertical-align: middle;
            position: relative;
            top: -1px;
            transition: transform 0.2s ease;
        }

        .nav-dropdown:hover .nav-dropdown-toggle::after {
            transform: rotate(-135deg);
            top: 1px;
        }

        .nav-dropdown-menu {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            list-style: none;
            background: #faf8f5;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 0.4rem 0;
            min-width: 120px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
        }

        .nav-dropdown:hover > .nav-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .nav-dropdown-menu li a {
            display: block;
            padding: 0.35rem 1rem;
            white-space: nowrap;
            font-size: 0.75rem;
        }

        .nav-dropdown-menu li a:hover {
            background: #f5f2ee;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: .5rem;
            z-index: 101;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #888;
            transition: all .3s ease;
        }

        .hamburger:hover span { background: #000; }

        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
        }

        .page-title {
            font-family: 'VT323', monospace;
            font-size: 5rem;
            color: #e67e22;
            margin-bottom: 2rem;
            text-align: center;
        }

        .login-box {
            width: min(380px, 100%);
            display: flex;
            flex-direction: column;
            gap: .85rem;
            background: #fff;
            border: 1px solid #ece7e0;
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .05);
        }

        input, button { font: inherit; }

        .field {
            width: 100%;
            padding: .72rem .86rem;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            background: #fff;
        }

        .field:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, .14);
        }

        .btn {
            border: none;
            border-radius: 8px;
            background: #e67e22;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            padding: .72rem .86rem;
        }

        .btn:hover { background: #cf6d17; }

        .login-error { color: #b62121; min-height: 1.1rem; font-size: .9rem; }

        .cloud-ui {
            display: none;
            width: min(1100px, 100%);
            background: #fff;
            border: 1px solid #ece7e0;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .06);
            overflow: hidden;
        }

        .cloud-layout { display: flex; min-height: 560px; }

        .sidebar {
            width: 260px;
            border-right: 1px solid #f0ece6;
            background: #fdfaf6;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: .9rem;
        }

        .panel {
            border: 1px solid #ece7e0;
            border-radius: 10px;
            background: #fff;
            padding: .8rem;
        }

        .panel h3 {
            font-size: .78rem;
            letter-spacing: .05em;
            color: #777;
            margin-bottom: .5rem;
            text-transform: uppercase;
        }

        .small { color: #777; font-size: .84rem; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .toolbar {
            padding: 1rem 1.1rem;
            border-bottom: 1px solid #f0ece6;
            display: flex;
            flex-wrap: wrap;
            gap: .8rem;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-title { font-size: 1.05rem; font-weight: 600; }
        .breadcrumbs { color: #777; font-size: .9rem; }
        .breadcrumbs a { color: #e67e22; text-decoration: none; }
        .breadcrumbs a:hover { text-decoration: underline; }

        .toolbar-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

        .btn-lite {
            border: 1px solid #e5e5e5;
            background: #fff;
            color: #333;
            padding: .5rem .72rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: .9rem;
        }

        .btn-lite:hover { background: #f8f8f8; }

        .drop-zone {
            margin: 1rem 1.1rem;
            border: 2px dashed #ecd6c2;
            border-radius: 10px;
            background: rgba(230, 126, 34, 0.04);
            color: #8b5f39;
            text-align: center;
            padding: .95rem;
            position: relative;
            cursor: pointer;
        }

        .drop-zone.dragover {
            border-color: #e67e22;
            background: rgba(230, 126, 34, 0.09);
        }

        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .table-wrap { padding: 0 1.1rem .8rem; overflow: auto; }

        table { width: 100%; border-collapse: collapse; }
        th, td {
            text-align: left;
            padding: .72rem .45rem;
            border-bottom: 1px solid #f4efe9;
            font-size: .92rem;
            white-space: nowrap;
        }

        th { color: #777; font-weight: 500; }

        .entry-name { display: flex; align-items: center; gap: .45rem; }
        .name-btn {
            border: none;
            background: none;
            color: #222;
            cursor: pointer;
            font: inherit;
            padding: 0;
            text-align: left;
        }

        .name-btn.folder { color: #c06214; font-weight: 600; }
        .name-btn:hover { text-decoration: underline; }

        .actions { display: flex; gap: .45rem; }
        .actions button {
            border: 1px solid #e5e5e5;
            border-radius: 7px;
            background: #fff;
            padding: .32rem .5rem;
            cursor: pointer;
            font-size: .82rem;
        }

        .actions .danger { color: #b62121; border-color: #efc7c7; }
        .status { padding: .2rem 1.1rem 1rem; min-height: 1.2rem; color: #777; font-size: .88rem; }

        .backup-form { display: flex; flex-direction: column; gap: .45rem; }
        .backup-form .field { margin: 0; font-size: .88rem; padding: .54rem .62rem; }

        @media (max-width: 900px) {
            .cloud-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #f0ece6; }
        }

        @media (max-width: 600px) {
            .hamburger { display: flex; }
            .nav-tabs {
                position: fixed;
                top: 0;
                right: 0;
                width: 220px;
                height: 100vh;
                background: #faf8f5;
                flex-direction: column;
                padding: 5rem 2rem 2rem;
                gap: 0.25rem;
                box-shadow: -4px 0 20px rgba(0, 0, 0, .1);
                transform: translateX(100%);
                transition: transform .3s ease;
            }
            .nav-tabs.open { transform: translateX(0); }

            .nav-dropdown-toggle {
                font-size: 0.7rem;
                font-weight: 500;
                color: #555555;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                display: block;
                padding: 0.75rem 0 0.25rem;
            }

            .nav-dropdown-toggle::after {
                display: none;
            }

            .nav-dropdown-menu {
                position: static;
                opacity: 1;
                visibility: visible;
                transform: none;
                background: none;
                border: none;
                border-radius: 0;
                padding: 0;
                min-width: 0;
                box-shadow: none;
            }

            .nav-dropdown-menu li a {
                font-size: 1rem;
                padding: 0.4rem 0 0.4rem 0.5rem;
            }

            .nav-dropdown-menu li a:hover {
                background: none;
            }

            .page-title { font-size: 3.6rem; }
            .page-container { padding: 4rem 1rem; }
        }
    </style>
</head>
<body>
<canvas id="polar-grid"></canvas>

<div class="page-container">
    <nav>
        <div class="hamburger" id="hamburger" aria-label="Toggle menu" role="button" tabindex="0">
            <span></span><span></span><span></span>
        </div>
        <ul class="nav-tabs" id="navTabs">
            <li class="nav-dropdown">
                <span class="nav-dropdown-toggle">About</span>
                <ul class="nav-dropdown-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="experience.html">Experience</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </li>
            <li class="nav-dropdown">
                <span class="nav-dropdown-toggle has-active">Work</span>
                <ul class="nav-dropdown-menu">
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="photos.html">Photos</a></li>
                    <li><a href="cloud.html" class="active">Cloud</a></li>
                </ul>
            </li>
            <li class="nav-dropdown">
                <span class="nav-dropdown-toggle">Writing</span>
                <ul class="nav-dropdown-menu">
                    <li><a href="hottakes.html">Hot Takes</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <h1 class="page-title">CLOUD</h1>

    <section id="loginBox" class="login-box">
        <input id="passwordInput" class="field" type="password" autocomplete="current-password" placeholder="Cloud password">
        <button id="loginBtn" class="btn">Log in</button>
        <div id="loginError" class="login-error"></div>
    </section>

    <section id="cloudUi" class="cloud-ui">
        <div class="cloud-layout">
            <aside class="sidebar">
                <div class="panel">
                    <h3>Navigation</h3>
                    <button id="homeBtn" class="btn-lite" style="width:100%;">📁 All files</button>
                    <div id="pathText" class="small" style="margin-top:.45rem;">Current: /</div>
                </div>

                <div class="panel">
                    <h3>GitHub backup</h3>
                    <form id="backupForm" class="backup-form">
                        <input id="repoInput" class="field" placeholder="owner/repo" required>
                        <input id="branchInput" class="field" placeholder="branch (optional)">
                        <input id="tokenInput" class="field" type="password" placeholder="token (optional)">
                        <button class="btn-lite" type="submit">Backup into current folder</button>
                    </form>
                    <p class="small" style="margin-top:.5rem;">Creates a ZIP snapshot via GitHub API.</p>
                </div>

                <div class="panel">
                    <h3>Session</h3>
                    <button id="logoutBtn" class="btn-lite" style="width:100%;">Log out</button>
                </div>
            </aside>

            <main class="main">
                <div class="toolbar">
                    <div>
                        <div class="toolbar-title">My Storage</div>
                        <div id="breadcrumbs" class="breadcrumbs"></div>
                    </div>
                    <div class="toolbar-actions">
                        <button id="newFolderBtn" class="btn-lite">New folder</button>
                        <button id="refreshBtn" class="btn-lite">Refresh</button>
                    </div>
                </div>

                <label id="dropZone" class="drop-zone">
                    Drag and drop files here, or click to upload to this folder.
                    <input id="fileInput" type="file" multiple>
                </label>

                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Size</th>
                            <th>Modified</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody id="fileTableBody"></tbody>
                    </table>
                </div>
                <div id="status" class="status"></div>
            </main>
        </div>
    </section>
</div>

<script>
    const hamburger = document.getElementById('hamburger');
    const navTabs = document.getElementById('navTabs');

    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        navTabs.classList.toggle('open');
    });
    hamburger.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            hamburger.click();
        }
    });

    navTabs.querySelectorAll('.nav-dropdown-menu a').forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('active');
            navTabs.classList.remove('open');
        });
    });

    const canvas = document.getElementById('polar-grid');
    const ctx = canvas.getContext('2d');

    function drawGrid() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const width = window.innerWidth;
        const height = window.innerHeight;

        ctx.clearRect(0, 0, width, height);
        ctx.strokeStyle = 'rgba(230, 126, 34, 0.09)';
        ctx.lineWidth = 1;

        const centerX = width * 0.5;
        const centerY = height * 0.5;

        for (let r = 60; r < Math.max(width, height); r += 60) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
            ctx.stroke();
        }

        for (let a = 0; a < Math.PI * 2; a += Math.PI / 12) {
            const x = centerX + Math.cos(a) * Math.max(width, height);
            const y = centerY + Math.sin(a) * Math.max(width, height);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    }

    window.addEventListener('resize', drawGrid);
    drawGrid();

    const loginBox = document.getElementById('loginBox');
    const cloudUi = document.getElementById('cloudUi');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');

    const homeBtn = document.getElementById('homeBtn');
    const newFolderBtn = document.getElementById('newFolderBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileTableBody = document.getElementById('fileTableBody');
    const status = document.getElementById('status');
    const breadcrumbs = document.getElementById('breadcrumbs');
    const pathText = document.getElementById('pathText');

    const backupForm = document.getElementById('backupForm');
    const repoInput = document.getElementById('repoInput');
    const branchInput = document.getElementById('branchInput');
    const tokenInput = document.getElementById('tokenInput');

    let currentPath = '';

    const getToken = () => sessionStorage.getItem('cloudToken');
    const authHeaders = (json = false) => {
        const headers = { Authorization: 'Bearer ' + getToken() };
        if (json) headers['Content-Type'] = 'application/json';
        return headers;
    };

    function showLogin() {
        cloudUi.style.display = 'none';
        loginBox.style.display = 'flex';
        passwordInput.focus();
    }

    function showCloud() {
        loginBox.style.display = 'none';
        cloudUi.style.display = 'block';
        loadFiles();
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function joinPath(base, name) { return base ? `${base}/${name}` : name; }

    function formatSize(bytes) {
        if (bytes === null || bytes === undefined) return '--';
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 ** 2) return `${(bytes / 1024).toFixed(1)} KB`;
        if (bytes < 1024 ** 3) return `${(bytes / 1024 ** 2).toFixed(1)} MB`;
        return `${(bytes / 1024 ** 3).toFixed(1)} GB`;
    }

    function formatDate(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? '--' : date.toLocaleString();
    }

    function setStatus(message, isError = false) {
        status.textContent = message;
        status.style.color = isError ? '#b62121' : '#777';
    }

    async function login() {
        loginError.textContent = '';
        const password = passwordInput.value;
        if (!password) return;

        try {
            const response = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            if (!response.ok) {
                loginError.textContent = 'Wrong password.';
                return;
            }

            sessionStorage.setItem('cloudToken', password);
            showCloud();
        } catch {
            loginError.textContent = 'Connection error.';
        }
    }

    function logout() {
        sessionStorage.removeItem('cloudToken');
        currentPath = '';
        showLogin();
    }

    function renderBreadcrumbs(path) {
        const parts = path ? path.split('/') : [];
        const nodes = ['<a data-path="">Home</a>'];
        let walker = '';
        for (const part of parts) {
            walker = walker ? `${walker}/${part}` : part;
            nodes.push(` / <a data-path="${escapeHtml(walker)}">${escapeHtml(part)}</a>`);
        }
        breadcrumbs.innerHTML = nodes.join('');
    }

    async function loadFiles(targetPath = currentPath) {
        try {
            const query = targetPath ? '?path=' + encodeURIComponent(targetPath) : '';
            const response = await fetch('/api/files' + query, { headers: authHeaders() });
            if (response.status === 401) return logout();

            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Could not load files');

            currentPath = payload.path || '';
            pathText.textContent = 'Current: /' + currentPath;
            renderBreadcrumbs(currentPath);
            renderEntries(payload.entries || []);
            setStatus('');
        } catch (error) {
            fileTableBody.innerHTML = '<tr><td colspan="4" style="color:#777;">Could not load files.</td></tr>';
            setStatus(error.message || 'Could not load files', true);
        }
    }

    function renderEntries(entries) {
        if (!entries.length) {
            fileTableBody.innerHTML = '<tr><td colspan="4" style="color:#777;">This folder is empty.</td></tr>';
            return;
        }

        fileTableBody.innerHTML = entries.map((entry) => {
            const fullPath = joinPath(currentPath, entry.name);
            const isFolder = entry.type === 'folder';
            return `
                <tr>
                    <td>
                        <div class="entry-name">
                            <span>${isFolder ? '📁' : '📄'}</span>
                            <button class="name-btn ${isFolder ? 'folder' : ''}" data-action="${isFolder ? 'open' : 'download'}" data-path="${escapeHtml(fullPath)}">${escapeHtml(entry.name)}</button>
                        </div>
                    </td>
                    <td>${isFolder ? '--' : formatSize(entry.size)}</td>
                    <td>${formatDate(entry.modified)}</td>
                    <td>
                        <div class="actions">
                            ${isFolder
                                ? `<button data-action="open" data-path="${escapeHtml(fullPath)}">Open</button>`
                                : `<button data-action="download" data-path="${escapeHtml(fullPath)}">Download</button>`}
                            <button class="danger" data-action="delete" data-path="${escapeHtml(fullPath)}">Delete</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function uploadFiles(files) {
        if (!files.length) return;

        for (const file of files) {
            setStatus(`Uploading ${file.name}...`);
            const formData = new FormData();
            formData.append('file', file);

            try {
                const query = currentPath ? '?path=' + encodeURIComponent(currentPath) : '';
                const response = await fetch('/api/upload' + query, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: formData
                });
                if (response.status === 401) return logout();

                if (!response.ok) {
                    const payload = await response.json();
                    throw new Error(payload.error || `Upload failed for ${file.name}`);
                }
            } catch (error) {
                setStatus(error.message || 'Upload failed', true);
                return;
            }
        }

        fileInput.value = '';
        setStatus('Upload complete.');
        loadFiles();
    }

    function downloadFile(path) {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/files/' + encodeURIComponent(path).replace(/%2F/g, '/'), true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + getToken());
        xhr.responseType = 'blob';

        xhr.onload = function () {
            if (xhr.status === 401) return logout();
            if (xhr.status !== 200) return setStatus('Download failed', true);

            const filename = path.split('/').pop();
            const url = URL.createObjectURL(xhr.response);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        };

        xhr.send();
    }

    async function deleteEntry(path) {
        if (!confirm(`Delete "${path}"?`)) return;

        try {
            const response = await fetch('/api/files/' + encodeURIComponent(path).replace(/%2F/g, '/'), {
                method: 'DELETE',
                headers: authHeaders()
            });
            if (response.status === 401) return logout();

            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Delete failed');

            setStatus('Deleted.');
            loadFiles();
        } catch (error) {
            setStatus(error.message || 'Delete failed', true);
        }
    }

    async function createFolder() {
        const name = prompt('Folder name:');
        if (!name) return;

        try {
            const response = await fetch('/api/folders', {
                method: 'POST',
                headers: authHeaders(true),
                body: JSON.stringify({ path: currentPath, name })
            });
            if (response.status === 401) return logout();

            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Could not create folder');

            setStatus(`Created folder ${name}`);
            loadFiles();
        } catch (error) {
            setStatus(error.message || 'Could not create folder', true);
        }
    }

    async function backupGithubRepo(event) {
        event.preventDefault();
        const repo = repoInput.value.trim();
        const branch = branchInput.value.trim();
        const token = tokenInput.value.trim();
        if (!repo) return;

        setStatus(`Backing up ${repo}...`);

        try {
            const response = await fetch('/api/github-backup', {
                method: 'POST',
                headers: authHeaders(true),
                body: JSON.stringify({ repo, branch, token, path: currentPath })
            });
            if (response.status === 401) return logout();

            const payload = await response.json();
            if (!response.ok) throw new Error(payload.error || 'Backup failed');

            setStatus(`Backup saved: ${payload.name}`);
            backupForm.reset();
            loadFiles();
        } catch (error) {
            setStatus(error.message || 'Backup failed', true);
        }
    }

    loginBtn.addEventListener('click', login);
    passwordInput.addEventListener('keydown', (event) => event.key === 'Enter' && login());
    logoutBtn.addEventListener('click', logout);

    homeBtn.addEventListener('click', () => loadFiles(''));
    newFolderBtn.addEventListener('click', createFolder);
    refreshBtn.addEventListener('click', () => loadFiles());

    fileInput.addEventListener('change', () => uploadFiles(fileInput.files));
    dropZone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropZone.classList.remove('dragover');
        uploadFiles(event.dataTransfer.files);
    });

    backupForm.addEventListener('submit', backupGithubRepo);

    fileTableBody.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const action = button.dataset.action;
        const path = button.dataset.path;
        if (action === 'open') loadFiles(path);
        if (action === 'download') downloadFile(path);
        if (action === 'delete') deleteEntry(path);
    });

    breadcrumbs.addEventListener('click', (event) => {
        const crumb = event.target.closest('[data-path]');
        if (!crumb) return;
        loadFiles(crumb.dataset.path || '');
    });

    if (getToken()) showCloud();
</script>
<script src="scroll-hide.js"></script>
</body>
</html>
