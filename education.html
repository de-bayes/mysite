        * {

            background: #faf8f5;
            color: #000000;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* NAV TABS */
        nav {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 100;
        }

        .nav-tabs {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-tabs a {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.02em;
        }

        .nav-tabs a:hover,
        .nav-tabs a.active {
            color: #000000;
        }

        /* PAGE CONTENT */
        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

            font-family: 'VT323', monospace;
            font-size: 5rem;
            color: #e67e22;
            margin-bottom: 3rem;
            text-align: center;
        }

        .education-content {
            max-width: 700px;
            width: 100%;
        }

        .education-item {
            padding: 2rem;
            border: 1px solid #e5e5e5;
            margin-bottom: 2rem;
        }

        .education-item h3 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.75rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .education-meta {
            font-size: 0.95rem;
            color: #555555;
            margin-bottom: 1rem;
        }

        .education-item p {
            font-size: 0.95rem;
            color: #666666;
            line-height: 1.7;
        }

        @media (max-width: 600px) {
            nav {
                top: 1rem;
                right: 1rem;
            }

            .nav-tabs {
                gap: 1rem;
            }

            .nav-tabs a {
                font-size: 0.65rem;
            }

            .page-title {
                font-size: 3.5rem;
            }

            .page-container {
                padding: 3rem 1.5rem;
            }

            .education-item {
                padding: 1.5rem;
            }
