<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Ryan McComb - Education">
    <link rel="icon" type="image/webp" href="538mascot.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&family=VT323&display=swap" rel="stylesheet">
    <title>Education - Ryan McComb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf8f5;
            color: #000000;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* NAV TABS */
        nav {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 100;
        }

        .nav-tabs {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-tabs > li {
            position: relative;
        }

        .nav-tabs a,
        .nav-dropdown-toggle {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888888;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.02em;
            cursor: pointer;
        }

        .nav-tabs a:hover,
        .nav-tabs a.active,
        .nav-dropdown:hover > .nav-dropdown-toggle,
        .nav-dropdown-toggle.has-active {
            color: #000000;
        }

        /* DROPDOWN */
        .nav-dropdown-toggle::after {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            border-right: 1px solid currentColor;
            border-bottom: 1px solid currentColor;
            transform: rotate(45deg);
            margin-left: 4px;
            vertical-align: middle;
            position: relative;
            top: -1px;
            transition: transform 0.2s ease;
        }

        .nav-dropdown:hover .nav-dropdown-toggle::after {
            transform: rotate(-135deg);
            top: 1px;
        }

        .nav-dropdown-menu {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            list-style: none;
            background: #faf8f5;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 0.4rem 0;
            min-width: 120px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
        }

        .nav-dropdown:hover > .nav-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .nav-dropdown-menu li a {
            display: block;
            padding: 0.35rem 1rem;
            white-space: nowrap;
            font-size: 0.75rem;
        }

        .nav-dropdown-menu li a:hover {
            background: #f5f2ee;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 101;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #888888;
            transition: all 0.3s ease;
        }

        .hamburger:hover span {
            background: #000000;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* PAGE CONTENT */
        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .page-title {
            font-family: 'VT323', monospace;
            font-size: 5rem;
            color: #3c3c3c;
            margin-bottom: 3rem;
            text-align: center;
        }

        .education-content {
            max-width: 700px;
            width: 100%;
        }

        .education-item {
            padding: 2rem;
            border: 1px solid #e5e5e5;
            margin-bottom: 2rem;
        }

        .education-item h3 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.75rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .education-meta {
            font-size: 0.95rem;
            color: #555555;
            margin-bottom: 1rem;
        }

        .education-item p {
            font-size: 0.95rem;
            color: #666666;
            line-height: 1.7;
        }

        @media (max-width: 600px) {
            .hamburger {
                display: flex;
            }

            nav {
                top: 1rem;
                right: 1rem;
            }

            .nav-tabs {
                position: fixed;
                top: 0;
                right: 0;
                width: 220px;
                height: 100vh;
                background: #faf8f5;
                flex-direction: column;
                padding: 5rem 2rem 2rem;
                gap: 0.25rem;
                box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }

            .nav-tabs.open {
                transform: translateX(0);
            }

            .nav-dropdown-toggle {
                font-size: 0.7rem;
                font-weight: 500;
                color: #555555;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                display: block;
                padding: 0.75rem 0 0.25rem;
            }

            .nav-dropdown-toggle::after {
                display: none;
            }

            .nav-dropdown-menu {
                position: static;
                opacity: 1;
                visibility: visible;
                transform: none;
                background: none;
                border: none;
                border-radius: 0;
                padding: 0;
                min-width: 0;
                box-shadow: none;
            }

            .nav-dropdown-menu li a {
                font-size: 1rem;
                padding: 0.4rem 0 0.4rem 0.5rem;
            }

            .nav-dropdown-menu li a:hover {
                background: none;
            }

            .nav-tabs a,
            .nav-dropdown-toggle {
                font-size: 0.65rem;
            }

            .page-title {
                font-size: 3.5rem;
            }

            .page-container {
                padding: 3rem 1.5rem;
            }

            .education-item {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="hamburger" onclick="toggleNav()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-tabs">
            <li class="nav-dropdown">
                <span class="nav-dropdown-toggle has-active">About</span>
                <ul class="nav-dropdown-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="experience.html">Experience</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="education.html" class="active">Education</a></li>
                </ul>
            </li>
            <li class="nav-dropdown">
                <span class="nav-dropdown-toggle">Work</span>
                <ul class="nav-dropdown-menu">
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="photos.html">Photos</a></li>
                </ul>
            </li>
            <li class="nav-dropdown">
                <span class="nav-dropdown-toggle">Writing</span>
                <ul class="nav-dropdown-menu">
                    <li><a href="hottakes.html">Hot Takes</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <div class="page-container">
        <h1 class="page-title">Education</h1>

        <div class="education-content">
            <div class="education-item">
                <h3>Evanston Township High School</h3>
                <p class="education-meta">Class of 2026 • Evanston, IL</p>
                <p>GPA: 3.98 Unweighted, 4.41 Weighted</p>
                <p style="margin-top: 1rem;">Currently taking Chem/Phys among other courses.</p>
            </div>
        </div>
    </div>

    <script>
        // HAMBURGER MENU
        function toggleNav() {
            document.querySelector('.hamburger').classList.toggle('active');
            document.querySelector('.nav-tabs').classList.toggle('open');
        }

        document.querySelectorAll('.nav-dropdown-menu a').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelector('.hamburger').classList.remove('active');
                document.querySelector('.nav-tabs').classList.remove('open');
            });
        });

        // Education has been merged into experience page
        window.location.href = 'experience.html';
    </script>
</body>
</html>
