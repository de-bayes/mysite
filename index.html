<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryan McComb</title>
  <meta name="description" content="Ryan McComb — design, data, and forecasting.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
  <meta property="og:title" content="Ryan McComb">
  <meta property="og:description" content="Design, data, and forecasting.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/SK-A-1892.jpg">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>

  <nav class="site-nav" id="site-nav"></nav>

  <main>
    <section class="hero">
      <img src="" alt="" class="hero-img" id="hero-img">

      <div class="hero-card">
        <h1>Ryan McComb</h1>
        <p>
          Student at Evanston Township High School and Student Fellow at
          <a href="https://votehub.com">VoteHub</a>, working on the decision desk
          and on forecasting models and prediction market integration.
        </p>
        <span class="hero-cite" id="hero-cite"></span>
      </div>
    </section>

    <script>
      (function() {
        var paintings = [
          { src: "SK-A-1892.jpg", alt: "La Corniche near Monaco by Claude Monet, 1884", cite: 'Claude Monet — <em>La Corniche near Monaco</em>, 1884' },
          { src: "SK-A-5003.jpg", alt: "The Bend in the Herengracht by Gerrit Berckheyde, c. 1672", cite: 'Gerrit Berckheyde — <em>The Bend in the Herengracht</em>, c. 1672' },
          { src: "SK-C-165.jpg", alt: "Winter Landscape by Barend Cornelis Koekkoek, 1835", cite: 'Barend Cornelis Koekkoek — <em>Winter Landscape</em>, 1835' }
        ];
        var pick = paintings[Math.floor(Math.random() * paintings.length)];
        document.getElementById("hero-img").src = pick.src;
        document.getElementById("hero-img").alt = pick.alt;
        document.getElementById("hero-cite").innerHTML = pick.cite;
      })();
    </script>
  </main>

  <footer class="site-footer">
    &copy; 2026 Ryan McComb
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/effects.js"></script>
</body>
</html>
